# GitLab CI mirror of .github/workflows/validate.yml — architecture validation gates.
# Same three checks as GitHub Actions so the repo validates wherever it is hosted
# (croadfeldt/dcm on GitHub; a GitLab mirror if used).
stages: [validate]

.validate_rules: &validate_rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "main"

contracts:
  stage: validate
  image: python:3.12-slim
  before_script:
    - pip install jsonschema pyyaml
  script:
    - python3 tests/validate_contracts.py
  rules: *validate_rules

terminology:
  stage: validate
  image: python:3.12-slim
  script:
    - python3 tests/check_terminology.py
  rules: *validate_rules

estate-tokens:
  stage: validate
  image: python:3.12-slim
  script:
    - python3 tests/check_estate_tokens.py
  rules: *validate_rules
