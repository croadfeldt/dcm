scenario:
  description: 'A tenant-admin requests decommission of a data store that is under an active legal hold
    for litigation. Even a fully authorized teardown must be refused while the hold is in force — the
    hold is a governance override that outranks the owner''s decommission intent. The system must evaluate
    hold status as a hard gate, refuse the destroy, and record the refusal with the hold reference. This
    probes whether governance policy can veto a legitimate decommission and whether holds are modeled
    as first-class constraints on teardown.

    '
  actor:
    persona: tenant-admin
    profile: fsi
  intent: Attempt to decommission a resource under an active legal hold
  success_criteria:
  - System resolves the active legal hold on the target data store
  - The decommission is refused while the hold is in force, regardless of owner authorization
  - The refusal names the hold reference and its governing policy
  - No destroy is dispatched and no realized state is cleared
  - The refusal is recorded in the audit trail with the hold citation
