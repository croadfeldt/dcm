scenario:
  description: 'A storage admin tries to decommission a shared ZFS pool that three tenants still hold
    active allocations against. Because the pool is a shareable resource with outstanding stakes, the
    system must refuse the teardown while any stake is live and surface which stakeholders block it. This
    probes whether the architecture models allocations as first-class stakes on a shared pool, so a pool
    cannot be destroyed out from under its consumers.

    '
