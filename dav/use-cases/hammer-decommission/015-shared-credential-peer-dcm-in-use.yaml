uuid: uc-hammer-decommission-015
handle: decommission/shared-credential-peer-dcm-in-use
scenario:
  description: 'A tenant-admin decommissions a service whose access credential is a federated credential
    also relied on by a peer DCM in a partner domain. Revoking it locally would break the peer''s live
    workloads. The system must consult the peer DCM before revoking, and when the peer is unreachable
    it must NOT revoke unilaterally — it should hold the credential and surface that the teardown cannot
    safely complete without peer confirmation. This probes cross-DCM coordination on destroy and likely
    returns partially supported or unsupported when the peer link is down.

    '
  actor:
    persona: tenant-admin
    profile: fsi
  intent: Decommission a service sharing a federated credential with a peer DCM
  success_criteria:
  - System identifies the credential as federated and shared with a peer DCM
  - The peer DCM is consulted before any local revocation
  - If the peer confirms it no longer needs the credential, revocation proceeds and teardown completes
  - If the peer is unreachable, the credential is NOT revoked unilaterally
  - The teardown is held with the peer-coordination gap surfaced, not silently forced
  - The peer consultation (or its failure) is recorded in the audit trail
  dimensions:
    lifecycle_phase: decommission
    resource_complexity: hard_dependencies
    policy_complexity: cross_domain_constraint
    provider_landscape: peer_dcm_required
    governance_context: audit_heavy
    failure_mode: peer_dcm_disconnect
  profile: fsi
  expected_domain_interactions:
  - domain: data
    interaction: credential identified as federated and shared across DCMs
  - domain: policy
    interaction: cross-DCM revocation policy requires peer confirmation before destroy
  - domain: provider
    interaction: peer DCM consulted; unreachable peer blocks unilateral revocation
  - domain: audit
    interaction: peer consultation or disconnect recorded
