uuid: uc-hammer-decommission-006
handle: decommission/credential-unrevocable-compensation
scenario:
  description: 'A tenant-admin decommissions a service whose teardown requires revoking a credential the
    service was issued — but the identity provider that minted it is unreachable, so the revocation cannot
    be confirmed. The system must not report a clean decommission with a live credential still floating.
    It must enter COMPENSATION_IN_PROGRESS: hold the decommission open, mark the credential as revocation-pending,
    retry or escalate, and only close when the credential is provably dead. This probes whether decommission
    is transactional with a compensation state, not a fire-and-forget delete.

    '
  actor:
    persona: tenant-admin
    profile: prod
  intent: Decommission a service whose credential revocation cannot be confirmed
  success_criteria:
  - Teardown reaches the credential-revocation step and the IdP call fails or times out
  - The decommission does NOT close as successful with an unrevoked credential
  - State transitions to COMPENSATION_IN_PROGRESS and the credential is marked revocation-pending
  - Revocation is retried or escalated to a human per the recovery policy
  - Decommission closes only after the credential is provably revoked; otherwise it stays open
  - The compensation state and every retry are recorded in the audit trail
  dimensions:
    lifecycle_phase: decommission
    resource_complexity: hard_dependencies
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: provider_failure
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: identity provider unreachable, credential revocation cannot be confirmed
  - domain: policy
    interaction: recovery policy drives COMPENSATION_IN_PROGRESS with retry/escalate
  - domain: data
    interaction: credential marked revocation-pending, decommission held open
  - domain: audit
    interaction: compensation state and retries recorded
