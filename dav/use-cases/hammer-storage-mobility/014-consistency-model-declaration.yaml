handle: storage-mobility/consistency-model-declaration
scenario:
  description: 'An application team provisions two datasets with explicit and different consistency contracts:
    a transactional dataset requiring strong (linearizable) consistency and an analytics dataset accepting
    eventual consistency for higher throughput. The system must let the intent declare a consistency model
    as a first-class property, validate that the chosen provider can honor the declared model, and only
    place each dataset on a provider whose declared capabilities satisfy it. This exercises whether consistency
    semantics are modeled and matched, or merely assumed uniform.

    '
  actor:
    persona: application-team-member
    profile: standard
  intent: Declare per-dataset consistency models and place on providers that honor them
  success_criteria:
  - Each dataset's intent declares a consistency model (strong or eventual)
  - Consistency model is a first-class, validated property of the resource
  - Provider selection requires the provider to declare support for the requested model
  - The strong-consistency dataset is not placed on an eventual-only provider
  - Realized state records the honored consistency model per dataset
  - A request for an unsupported consistency model is flagged rather than silently downgraded
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: consistency model persisted as a first-class per-dataset property
  - domain: policy
    interaction: placement validates provider consistency capability against the declared model
  - domain: provider
    interaction: providers advertise supported consistency models for matching
  - domain: audit
    interaction: honored consistency model recorded per dataset
