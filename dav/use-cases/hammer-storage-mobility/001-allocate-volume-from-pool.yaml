handle: storage-mobility/allocate-volume-from-pool
scenario:
  description: 'A platform engineer requests a 500 GiB StorageVolume carved from a named StoragePool backed
    by a single eligible storage provider. The system must record the volume as a resource with a stable
    UUID, bind it to the parent pool as a hard dependency, and have the provider realize the allocation.
    This exercises the baseline block-allocation path and the Storage.Pool -> Storage.Volume containment
    relationship on the simplest possible request.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Allocate a block volume of a requested size from an existing storage pool
  success_criteria:
  - StorageVolume resource is created with a stable UUID
  - Volume record declares parent StoragePool as a hard dependency
  - Requested capacity is validated against pool free space before dispatch
  - Provider realizes the allocation and returns a realized handle
  - Realized state records the backing pool, size, and provider-native volume id
  - Intent size matches realized size after allocation
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: policy
    interaction: capacity validation checks requested size against pool free space
  - domain: data
    interaction: volume resource persisted with hard dependency on parent pool
  - domain: provider
    interaction: storage provider realizes the block allocation
  - domain: audit
    interaction: allocation event recorded with pool, size, and provider handle
