handle: storage-mobility/volume-residency-placement-enforced
scenario:
  description: 'A tenant under a data-residency mandate (all data must remain in-region) requests a new
    Storage.Volume. Two providers are eligible on capability, but only one operates within the mandated
    region. The system must enforce the residency constraint during placement so the volume is allocated
    only on the in-region provider, and must refuse to fall back to the out-of-region provider even when
    it is otherwise a better fit on cost or capacity. This exercises residency as a hard placement constraint
    on a straightforward allocation.

    '
  actor:
    persona: security-officer
    profile: sovereign
  intent: Allocate a volume only on a provider within the mandated data-residency region
  success_criteria:
  - Requesting tenant's residency mandate is resolved for the request
  - Each eligible provider's operating region is evaluated against the mandate
  - Volume is placed only on the in-region provider
  - The out-of-region provider is excluded even if cheaper or larger
  - Realized state records the placement region for later audit
  - A request with no compliant provider is refused rather than placed out-of-region
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: single_validation
    provider_landscape: multiple_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: residency constraint filters providers by operating region
  - domain: provider
    interaction: only the in-region provider is eligible to realize the volume
  - domain: data
    interaction: placement region recorded on realized volume
  - domain: audit
    interaction: residency-constrained placement decision recorded
