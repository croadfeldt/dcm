    interaction: separation-of-duties checks approver identity against requester
  - domain: policy
    interaction: self-approval rejected, override left pending
  - domain: data
    interaction: rejected self-approval recorded against the override request
  - domain: audit
    interaction: separation-of-duties rejection logged for review
