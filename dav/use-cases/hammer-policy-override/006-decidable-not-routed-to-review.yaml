handle: policy-override/decidable-not-routed-to-review
scenario:
  description: 'A platform-engineer submits a request that is fully decidable by the policy set: every
    in-scope policy has the data it needs and returns a definite verdict. Per DPO-007 — human-in-the-loop
    is a necessary anti-pattern to be minimized wherever a policy could decide — the engine must render
    the automated decision and must NOT route the request to human review. Route-to-review is reserved
    for the genuinely undecidable. This UC probes whether the architecture treats review as a last resort
    or leaks it into the common path: a request that a policy can decide should never land in a human
    queue. A finding of routed-to-review here is a defect, not a feature.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Submit a fully policy-decidable request and confirm no human review is invoked
  success_criteria:
  - Every in-scope policy returns a definite pass or fail with no missing inputs
  - The engine renders the automated verdict without routing to human review
  - No review task is created and no human queue is touched
  - The decision path records that the request was policy-decidable
  - Route-to-review remains available but unused for this decidable case
  - The audit trail shows an automated decision, not an escalation
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: all in-scope policies return definite verdicts with complete inputs
  - domain: policy
    interaction: engine decides automatically, suppressing route-to-review
  - domain: audit
    interaction: decision recorded as policy-decidable, no review task created
