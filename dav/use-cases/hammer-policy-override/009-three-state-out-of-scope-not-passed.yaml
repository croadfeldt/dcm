handle: policy-override/three-state-out-of-scope-not-passed
scenario:
  description: 'A compliance-auditor submits a request on a minimal profile that resolves to a small policy
    set. Several org-wide policies (e.g. a data-residency policy) are NOT in scope for this profile. The
    engine must report a three-state outcome per policy: evaluated_pass, evaluated_fail, or out_of_scope
    — and critically, out_of_scope must be reported honestly as ungoverned, never collapsed into a silent
    pass. An ungoverned dimension is not a satisfied one. The mechanism under test is the integrity of
    the three-state audit outcome, so that "this profile does not govern residency" is never mistaken
    for "residency was checked and passed."

    '
  actor:
    persona: compliance-auditor
    profile: homelab
  intent: Verify out-of-scope policies are reported as ungoverned, not passed
  success_criteria:
  - The resolved profile's policy set is selected by construction
  - In-scope policies report evaluated_pass or evaluated_fail
  - Out-of-scope policies report out_of_scope, distinct from evaluated_pass
  - No out-of-scope policy is recorded as skipped-and-passed
  - The audit outcome lets a reader tell ungoverned from checked-and-passed
  - No global fall-through evaluates policies outside the resolved profile
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: single_eligible
    governance_context: no_governance
    failure_mode: happy_path
  profile: homelab
  expected_domain_interactions:
  - domain: policy
    interaction: profile-resolved policy set evaluated, others marked out_of_scope
  - domain: data
    interaction: three-state outcomes stored per policy against the request
  - domain: audit
    interaction: out-of-scope reported honestly, never as a silent pass
