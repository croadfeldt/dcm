handle: policy-override/soft-enforcement-warns-allows
scenario:
  description: 'An application-team-member submits a request that trips a soft-enforcement advisory policy
    — for example, a naming-convention or tagging-hygiene policy. Because the policy is advisory (soft,
    non-blocking), the engine must record a warning against the request, allow it to proceed to dispatch,
    and surface the advisory to the actor without demanding an override. A soft warn is not a block and
    must not require the override workflow. The mechanism under test is the enforcement-class distinction:
    advisory policies annotate but do not gate.

    '
  actor:
    persona: application-team-member
    profile: standard
  intent: Submit a request that trips an advisory policy and still proceeds
  success_criteria:
  - The advisory policy is evaluated and flags the request
  - A warning is recorded but the request is not blocked
  - No override workflow is triggered for the advisory finding
  - Dispatch proceeds with the warning attached to the request
  - The warning is visible to the actor and preserved in the audit trail
  - The enforcement class (advisory) is explicit in the recorded outcome
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: policy
    interaction: advisory policy flags the request without blocking
  - domain: data
    interaction: warning attached to the request record
  - domain: audit
    interaction: advisory warning preserved alongside the pass-through outcome
