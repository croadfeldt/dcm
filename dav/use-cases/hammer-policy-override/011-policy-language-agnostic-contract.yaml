handle: policy-override/policy-language-agnostic-contract
scenario:
  description: 'A platform-engineer registers two policies that express the same rule in different policy
    languages — one in a Rego-style engine, one in a declarative constraint DSL. DCM''s contract with
    a policy is the verdict interface (in-scope determination, three-state outcome, enforcement class,
    override eligibility), not the language the policy is authored in. Given identical requests, both
    policies must produce identical contract-level verdicts, and the engine must treat them interchangeably.
    The mechanism under test is policy-language agnosticism: DCM depends on the policy contract, not on
    any specific evaluation engine. This probes whether the architecture has leaked an engine assumption
    into the contract.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Confirm two engines expressing one rule yield identical contract verdicts
  success_criteria:
  - Both policies are registered against the same verdict contract
  - The engine does not require a single specific policy language
  - Identical requests produce identical three-state outcomes from both policies
  - Enforcement class and override eligibility are read from the contract, not the engine
  - Swapping the backing engine does not change the request's verdict
  - No evaluation-engine detail leaks into the request or audit record
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: policy
    interaction: two engines evaluated against one verdict contract, results compared
  - domain: data
    interaction: verdict stored by contract fields, engine-agnostic
  - domain: audit
    interaction: outcome recorded without leaking engine-specific detail
