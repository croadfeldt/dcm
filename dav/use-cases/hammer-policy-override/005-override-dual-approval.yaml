    separate roles (e.g. a security-officer and a compliance-owner) must both grant before the override
    takes effect. A single approval must leave the override pending, not active. The mechanism under test
    is an override eligibility rule that requires an approval quorum, and the correct sequencing of a
    pending-to-active transition only on the second grant.

    '
