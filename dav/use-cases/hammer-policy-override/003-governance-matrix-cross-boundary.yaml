handle: policy-override/governance-matrix-cross-boundary
scenario:
  description: 'A platform-engineer declares a dependency that crosses a governance boundary: a workload
    in a sovereign estate must attach to a shared logging service realized in a peer DCM in a different
    jurisdiction. No single-resource policy denies either resource on its own — the constraint lives in
    the governance matrix, which governs the interaction between the two governance classes. The engine
    must consult the matrix for the (sovereign-workload x foreign-shared-service) cell and deny the cross-boundary
    attachment even though both endpoints are individually permitted. The mechanism under test is the
    governance matrix firing on an interaction, not on either resource in isolation.

    '
  actor:
    persona: platform-engineer
    profile: sovereign
  intent: Attach a sovereign workload to a shared service governed in a foreign estate
  success_criteria:
  - Both endpoint resources individually pass their own in-scope policies
  - The cross-boundary interaction is identified from the dependency payload
  - The governance matrix cell for the two governance classes is consulted
  - The interaction is denied even though neither endpoint is denied alone
  - The denial names the matrix cell and the two governance classes involved
  - No attachment is realized and no peer dispatch crosses the boundary
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: cross_dependency_payload
    policy_complexity: governance_matrix_enforcement
    provider_landscape: peer_dcm_required
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: governance matrix consulted for the cross-class interaction cell
  - domain: data
    interaction: cross-boundary dependency payload inspected for governance classes
  - domain: provider
    interaction: peer dispatch withheld because the interaction is denied
  - domain: audit
    interaction: matrix-cell denial recorded naming both governance classes
