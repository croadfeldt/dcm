  intent: Evaluate a candidate policy in shadow mode without affecting live decisions
  success_criteria:
  - The shadow policy is evaluated on every matched request
  - The shadow verdict is recorded as would-have without changing the live outcome
  - No request is blocked or altered by the shadow policy
  - The would-block rate is derivable from the recorded shadow verdicts
  - Shadow verdicts are stored distinctly from enforced verdicts on the same request
  - The policy's shadow lifecycle state is explicit and separate from active
