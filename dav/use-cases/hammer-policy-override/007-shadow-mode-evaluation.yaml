scenario:
  description: 'A security-officer stages a new placement policy in shadow mode before enforcing it. For
    every matched request the engine must evaluate the shadow policy alongside the active policy set,
    record what verdict it WOULD have produced, and surface the would-block rate — all without affecting
    the live decision or blocking any request. This lets the team measure blast radius before activation.
    The mechanism under test is a policy lifecycle state (shadow) whose verdicts are observed and recorded
    but never enforced, cleanly separated from the enforced verdict on the same request.

    '
