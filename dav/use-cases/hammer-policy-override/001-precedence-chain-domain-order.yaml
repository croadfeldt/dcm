    interaction: four conflicting in-scope policies evaluated and verdicts captured
  - domain: policy
    interaction: conflict resolved by declared domain-precedence lattice
  - domain: data
    interaction: resolved verdict plus superseded verdicts stored against the request
  - domain: audit
    interaction: precedence resolution recorded with the deciding rule
