uuid: uc-hammer-credentials-011
handle: credentials/credential-as-dependency
scenario:
  description: 'An application team declares a VM whose intent includes `requires: Credential.SSHKey`
    — the VM cannot be realized until an SSH key credential exists and is bound to it. The placement and
    dependency engine must treat the credential as a first-class node in the dependency graph, order its
    issuance before the VM''s realization, and refuse to realize the VM if the credential dependency is
    unmet. This tests whether Credential is a real dependable resource type, not just an out-of-band side
    input.

    '
  actor:
    persona: application-team-member
    profile: standard
  intent: Realize a VM that hard-depends on an SSH key credential
  success_criteria:
  - The VM intent's requires-Credential.SSHKey edge is parsed into the dependency graph
  - Credential issuance is ordered before VM realization
  - The VM is not realized while the credential dependency is unmet
  - The realized VM references the credential by non-secret handle only
  - Destroying the credential marks the VM dependency as broken
  - The dependency ordering is recorded in audit
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: credential modeled as a dependency node ahead of the VM
  - domain: policy
    interaction: unmet credential dependency blocks VM realization
  - domain: provider
    interaction: VM provider consumes the credential handle at realization
  - domain: audit
    interaction: dependency ordering and binding recorded
