uuid: uc-hammer-credentials-015
handle: credentials/cross-dcm-credential-scope
scenario:
  description: 'A federated request routes an interaction to a peer DCM, carrying a credential issued
    by the local DCM and scoped only to local providers. The peer DCM must decide whether it can honor
    a foreign-issued credential: either it recognizes a federation trust relationship and accepts the
    scoped credential, or it rejects it and requires a peer-issued or federation-brokered credential.
    This tests credential scope and trust across a DCM federation boundary and may surface as partially_supported.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Present a locally-issued credential to a peer DCM across federation
  success_criteria:
  - The credential's issuer and scope are evaluated at the peer DCM boundary
  - A recognized federation trust relationship is required to honor it
  - Absent trust, the peer DCM rejects the foreign credential
  - No implicit trust is granted purely because the credential is valid locally
  - The federation trust decision is explicit and recorded
  - The cross-DCM credential decision is captured in audit on both sides
  dimensions:
    lifecycle_phase: modification
    resource_complexity: hard_dependencies
    policy_complexity: cross_domain_constraint
    provider_landscape: peer_dcm_required
    governance_context: standard_governance
    failure_mode: peer_dcm_disconnect
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: federation trust policy evaluates the foreign credential's scope
  - domain: provider
    interaction: peer DCM accepts or rejects the credential per federation trust
  - domain: data
    interaction: issuer and scope compared against federation trust records
  - domain: audit
    interaction: cross-DCM credential decision recorded on both DCMs
