handle: credentials/credential-lifecycle-audit-trail
scenario:
  description: 'A compliance auditor requests a complete, tamper-evident history of a single credential:
    every issuance, rotation, use-scope grant, revocation, and expiry event, with issuer and justification,
    and never the secret value. The system must reconstruct the credential''s full lifecycle from the
    audit domain across all phases and prove no event is missing. This tests whether credential lifecycle
    events are consistently and completely captured for compliance review.

    '
  actor:
    persona: compliance-auditor
    profile: fsi
  intent: Produce a complete tamper-evident lifecycle history for one credential
  success_criteria:
  - Every lifecycle event (issue, rotate, grant, revoke, expire) is present
  - Each event records issuer, timestamp, scope change, and justification
  - The secret value appears nowhere in the history
  - The history is tamper-evident and independently verifiable
  - Gaps or missing events are detectable, not silently absent
  - The reconstructed lifecycle is itself recorded as an audit query
  dimensions:
    lifecycle_phase: modification
    resource_complexity: hard_dependencies
    policy_complexity: governance_matrix_enforcement
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: audit
    interaction: full credential lifecycle reconstructed from recorded events
  - domain: data
    interaction: event references resolved without exposing secret values
  - domain: policy
    interaction: completeness and tamper-evidence requirements enforced
