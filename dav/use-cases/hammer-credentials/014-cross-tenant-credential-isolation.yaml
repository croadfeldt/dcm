uuid: uc-hammer-credentials-014
handle: credentials/cross-tenant-credential-isolation
scenario:
  description: 'A tenant admin in tenant A attempts to reference or reuse a credential that belongs to
    tenant B — by handle, fingerprint, or dependency edge. The system must enforce tenant isolation: credentials
    are scoped to their owning tenant, and no cross-tenant reference, listing, or reuse is permitted.
    This tests whether the credential model prevents cross-tenant leakage even when an actor knows the
    target credential''s non-secret handle.

    '
  actor:
    persona: tenant-admin
    profile: prod
  intent: Attempt to reuse another tenant's credential and confirm it is denied
  success_criteria:
  - The credential's owning tenant is recorded and enforced
  - Tenant A cannot list, reference, or reuse tenant B's credential
  - Knowing the non-secret handle does not grant cross-tenant access
  - No dependency edge from tenant A to tenant B's credential can be created
  - The blocked cross-tenant attempt is surfaced as a security event
  - The denial is recorded in audit
  dimensions:
    lifecycle_phase: modification
    resource_complexity: single_no_deps
    policy_complexity: cross_domain_constraint
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: provider_failure
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: tenant-isolation policy denies cross-tenant credential reference
  - domain: data
    interaction: credential ownership scoped to tenant; no cross-tenant edge allowed
  - domain: audit
    interaction: cross-tenant reuse attempt recorded as denied
