uuid: uc-hammer-credentials-018
handle: credentials/rehydration-reissue-credentials
scenario:
  description: 'After total destruction, the estate is rehydrated from stored intent. Because credential
    secret values were never stored in the model (CPX-001), rehydration cannot restore the old secrets
    — it must re-issue fresh credentials that satisfy the same intent (same scope, same bindings) and
    re-wire every dependent to the new credential. The system must recognize that credentials are re-issued
    rather than restored, preserve credential UUIDs and scope while the underlying secret is new, and
    re-bind consumers. This tests whether the rehydration model correctly handles resources whose value
    is intentionally absent.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Rehydrate an estate by re-issuing credentials rather than restoring secrets
  success_criteria:
  - Rehydration recognizes credential secrets were never stored and cannot be restored
  - Fresh credentials are re-issued to satisfy the original credential intent
  - Credential UUID and scope are preserved; only the underlying secret is new
  - All dependents are re-bound to the re-issued credentials
  - Dependency ordering re-issues credentials before their dependents are realized
  - The re-issue-not-restore decision is recorded in audit
  dimensions:
    lifecycle_phase: rehydration_faithful
    resource_complexity: composite_service
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: data
    interaction: credential intent read; secret absent by construction; UUID/scope preserved
  - domain: policy
    interaction: rehydration policy mandates re-issue over restore for credentials
  - domain: provider
    interaction: providers mint fresh secrets satisfying the original scope
  - domain: audit
    interaction: re-issue-not-restore arc recorded
