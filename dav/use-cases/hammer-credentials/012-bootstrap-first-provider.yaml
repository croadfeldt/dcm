uuid: uc-hammer-credentials-012
handle: credentials/bootstrap-first-provider
scenario:
  description: 'On a greenfield estate, the very first provider must be onboarded — but issuing any credential
    normally requires an already-trusted provider to mint or attest it. This is the bootstrap chicken-and-egg:
    there is no prior credential authority to lean on. The system must define how the first provider''s
    initial credential is established (an out-of-band root of trust, a one-time bootstrap token, operator
    attestation) and record it as such. This deliberately probes the origin of trust and is a strong candidate
    for unsupported.

    '
  actor:
    persona: platform-engineer
    profile: sovereign
  intent: Establish the first provider credential with no pre-existing authority
  success_criteria:
  - The absence of any prior credential authority is recognized
  - A defined bootstrap mechanism (out-of-band root, one-time token, operator attestation) is used
  - The first credential is marked as bootstrap-origin, not peer-issued
  - Subsequent credentials can chain their trust from this root
  - No circular dependency on an as-yet-nonexistent provider is required
  - The bootstrap origin and its trust basis are recorded in audit
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: cross_domain_constraint
    provider_landscape: single_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: bootstrap policy defines the root-of-trust for the first credential
  - domain: provider
    interaction: first provider is admitted using a bootstrap-origin credential
  - domain: data
    interaction: credential recorded as bootstrap-origin with no peer issuer
  - domain: audit
    interaction: bootstrap trust basis recorded
