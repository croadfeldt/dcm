uuid: uc-hammer-credentials-001
handle: credentials/issue-scoped-credential
scenario:
  description: 'A platform engineer requests a new credential scoped to a single provider and a single
    interaction (deploy-only) for an application service. The system must mint a Credential resource whose
    model record carries scope, provider binding, issuer, and validity window as metadata only — never
    the secret value. This exercises the baseline credential issuance path and the CPX-001 metadata-only
    invariant on the simplest possible request.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Issue a provider-scoped, interaction-scoped credential for a service
  success_criteria:
  - Credential resource is created with a stable UUID
  - Record captures scope (provider + interaction) as structured metadata
  - Validity window (not_before / not_after) is recorded
  - The secret value is never written to any of the four state stores
  - Issuer identity and issuing policy are recorded
  - Credential is usable only for the declared provider and interaction
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: policy
    interaction: issuance policy validates requested scope against actor entitlement
  - domain: data
    interaction: credential metadata persisted, secret value excluded by construction
  - domain: audit
    interaction: issuance event recorded with issuer, scope, and validity
