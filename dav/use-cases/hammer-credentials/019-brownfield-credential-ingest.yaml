uuid: uc-hammer-credentials-019
handle: credentials/brownfield-credential-ingest
scenario:
  description: 'A platform engineer onboards an existing estate whose providers already have credentials
    minted out-of-band. Brownfield ingestion must discover these pre-existing credentials and record them
    as Credential resources — capturing scope, issuer, fingerprint, and validity as metadata only — without
    ever ingesting or storing the secret value. Credentials that cannot be characterized (unknown scope
    or issuer) must be flagged rather than silently trusted. This tests whether the credential model can
    absorb pre-existing secrets under the CPX-001 metadata-only invariant.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Ingest pre-existing provider credentials as metadata-only records
  success_criteria:
  - Pre-existing credentials are discovered during brownfield ingestion
  - Each becomes a Credential record with scope, issuer, fingerprint, and validity metadata
  - No secret value is ingested or stored at any point
  - Credentials with unknown scope or issuer are flagged, not silently trusted
  - Ingested credentials are linked to the resources that depend on them
  - The ingestion and any flags are recorded in audit
  dimensions:
    lifecycle_phase: brownfield_ingestion
    resource_complexity: composite_service
    policy_complexity: multi_policy_chain
    provider_landscape: mixed
    governance_context: standard_governance
    failure_mode: data_inconsistency
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: existing credentials recorded as metadata-only Credential resources
  - domain: policy
    interaction: ingestion policy flags uncharacterizable credentials
  - domain: provider
    interaction: provider inventory reveals the pre-existing credentials
  - domain: audit
    interaction: ingestion results and flags recorded
