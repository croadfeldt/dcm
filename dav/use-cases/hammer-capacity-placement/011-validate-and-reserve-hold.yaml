scenario:
  description: 'A platform engineer requests a multi-resource change where downstream steps must validate
    before any capacity is committed. Per the validate-and-reserve model (ADR-011 — reservation precedes
    realization so capacity is never oversubscribed), the engine must place a hold on provider capacity,
    complete validation while the hold is live, and only then promote the reservation to an allocation.
    This tests the two-phase reserve-then-commit boundary as an explicit, observable step.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Hold capacity via reservation, then commit only after validation
  success_criteria:
  - A capacity reservation (hold) is placed before realization begins
  - Validation runs against the reserved plan while the hold is live
  - Held capacity is not counted as available to other requests
  - On successful validation the reservation is promoted to an allocation
  - No double-counting or oversubscription of provider capacity occurs
  - The reserve, validate, and commit transitions are recorded in the audit trail
  dimensions:
