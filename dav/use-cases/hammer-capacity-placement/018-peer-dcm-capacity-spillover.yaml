scenario:
  description: 'Local providers are exhausted, so a request must spill over to a federated peer DCM that
    advertises capacity. The engine must query the peer for eligible capacity, honor local policy (residency,
    attestation) against the peer''s offered nodes, reserve across the DCM boundary, and realize on the
    peer while keeping the resource governed by the originating DCM. This tests cross-DCM capacity borrowing
    as a placement option with policy preserved over federation.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Spill placement to a peer DCM when local capacity is exhausted
  success_criteria:
  - Local providers are confirmed exhausted before considering the peer
  - The peer DCM is queried for eligible capacity across the federation boundary
  - Local policy (residency, attestation) is enforced against peer-offered nodes
  - Capacity is reserved on the peer and the resource realized there
  - Governance of the resource remains with the originating DCM
  - The spillover decision and cross-DCM reservation are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
