    governance_context: standard_governance
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: peer DCM queried and capacity reserved across the boundary
  - domain: policy
    interaction: originating policy enforced on peer-offered nodes
  - domain: audit
    interaction: spillover decision and cross-DCM reservation recorded
