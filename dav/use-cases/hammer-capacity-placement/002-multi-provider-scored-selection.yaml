scenario:
  description: 'An application team requests a compute resource in a landscape where several providers
    are eligible and have capacity. The placement engine must score candidates on declared capability
    match and an attestation floor, breaking ties deterministically, then reserve on the winning provider
    only. This tests that provider selection is a scored, explainable decision rather than first-fit,
    and that the losing candidates are never reserved.

    '
  actor:
    persona: application-team-member
    profile: prod
  intent: Select the best-scoring provider among several eligible candidates
  success_criteria:
  - All eligible providers with capacity are enumerated as candidates
  - Each candidate is scored on capability match and attestation level
  - Candidates below the attestation floor are excluded before scoring
  - A single winning provider is chosen by deterministic score ordering
  - Only the winning provider receives a capacity reservation
  - The score vector and selection rationale are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: candidate providers scored on capability and attestation, winner reserved
  - domain: policy
    interaction: attestation-floor validation excludes under-attested candidates
  - domain: audit
    interaction: score vector and selection rationale recorded
