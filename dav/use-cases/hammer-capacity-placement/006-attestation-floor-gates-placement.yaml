handle: capacity/attestation-floor-gates-placement
scenario:
  description: 'An FSI tenant requires that workloads land only on nodes whose current attestation meets
    a declared floor. Among a mixed pool of attested and unattested providers with capacity, the placement
    engine must gate on live attestation evidence before scoring, admitting only nodes at or above the
    floor. This tests attestation as an admission gate on placement rather than a post-hoc audit check.

    '
  actor:
    persona: security-officer
    profile: fsi
  intent: Admit placement only on nodes meeting the attestation floor
  success_criteria:
  - Live attestation evidence is collected for each candidate provider
  - Providers below the attestation floor are excluded from candidacy
  - Only at-or-above-floor providers are scored and reserved
  - The realized node's attestation state is captured at placement time
  - A capacity-rich but under-attested provider is demonstrably rejected
  - Attestation evidence and admission decisions are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: mixed
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: attestation-floor admission gate evaluated before scoring
  - domain: provider
    interaction: attested providers scored and reserved, unattested excluded
  - domain: audit
    interaction: attestation evidence and admission decisions recorded
