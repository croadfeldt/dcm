uuid: uc-hammer-capacity-007
handle: capacity/attestation-floor-none-qualify
scenario:
  description: 'A compliance-gated request declares an attestation floor that no provider in the eligible
    pool currently satisfies, though several have ample capacity. The placement engine must not down-rank
    the floor to capture capacity; it must fail closed with no placement and surface that the blocker
    is attestation, not capacity. This probes whether the architecture distinguishes an attestation-blocked
    outcome from a capacity one, and may return unsupported if the two failure modes are conflated.

    '
  actor:
    persona: compliance-auditor
    profile: fsi
  intent: Place under an attestation floor no eligible provider meets
  success_criteria:
  - Attestation evidence is gathered for all capacity-eligible providers
  - No provider meets the declared attestation floor
  - The floor is never lowered to admit an under-attested provider
  - The request fails closed with attestation named as the distinct blocker
  - No reservation is held on any provider
  - The attestation-blocked outcome (distinct from exhaustion) is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: compliance_gated
    failure_mode: provider_failure
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: attestation floor held; blocker classified as attestation not capacity
  - domain: provider
    interaction: capacity-rich but under-attested providers all rejected
  - domain: audit
    interaction: attestation-blocked outcome recorded distinctly from exhaustion
