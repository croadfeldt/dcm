scenario:
  description: 'An FSI trading workload requires nodes whose attested time-synchronization capability
    (traceable, bounded-offset clock) meets a profile-defined floor for regulatory timestamping. The placement
    engine must treat attested time-sync as a scored capability admission criterion, admitting only providers
    whose current attested clock quality clears the floor. This tests capability-typed placement where
    the deciding attribute is an operational, time-varying attestation, not a static provider label.

    '
