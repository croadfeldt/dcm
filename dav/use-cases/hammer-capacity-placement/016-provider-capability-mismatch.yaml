uuid: uc-hammer-capacity-016
handle: capacity/provider-capability-mismatch
scenario:
  description: 'A request declares a capability the only eligible provider cannot deliver — for example
    a confidential-computing enclave or a specific accelerator class the provider does not expose — even
    though that provider has raw capacity. The engine must match on declared capability, not just free
    capacity, find no capable provider, and fail closed rather than place on an incapable node. This tests
    capability as a hard match dimension distinct from capacity, and may return unsupported if selection
    keys on capacity alone.

    '
  actor:
    persona: application-team-member
    profile: standard
  intent: Place a request whose required capability no eligible provider offers
  success_criteria:
  - The required capability is resolved from the request declaration
  - The eligible provider is checked for the capability, not merely free capacity
  - The capability mismatch is detected despite available raw capacity
  - The engine fails closed without placing on an incapable provider
  - No reservation is made against the mismatched provider
  - The capability mismatch (distinct from a capacity shortfall) is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: provider_failure
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: provider capability checked and found insufficient despite capacity
  - domain: policy
    interaction: capability-match validation fails closed
  - domain: audit
    interaction: capability mismatch recorded distinctly from a capacity shortfall
