uuid: uc-hammer-capacity-003
handle: capacity/all-providers-capacity-exhausted
scenario:
  description: 'A platform engineer submits a valid request but every eligible provider reports zero available
    capacity at reservation time. The placement engine must exhaust the candidate set, fail closed with
    a RESERVE_QUERY_ALL_EXHAUSTED condition, hold no partial reservation, and leave the resource in a
    pending/blocked state that can be retried when capacity returns. This probes whether the architecture
    models capacity exhaustion as a first-class, recoverable outcome rather than a hard error.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Place a resource when no eligible provider has capacity
  success_criteria:
  - Every eligible provider is queried for capacity
  - All candidates report insufficient capacity
  - The engine raises RESERVE_QUERY_ALL_EXHAUSTED and fails closed
  - No partial or speculative reservation is left held on any provider
  - The resource is left in a retryable pending state, not realized
  - The exhaustion outcome and the candidate set queried are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: provider_failure
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: all eligible providers queried and report exhausted capacity
  - domain: policy
    interaction: fail-closed placement policy blocks realization
  - domain: audit
    interaction: RESERVE_QUERY_ALL_EXHAUSTED outcome and candidate set recorded
