  - domain: data
    interaction: SoftwarePackage and full provenance chain written to the in-jurisdiction store
  - domain: provider
    interaction: Compute.BareMetal.Metal3 bound to the residency-compliant package source
  - domain: audit
    interaction: residency check and provenance evidence recorded for sovereign audit
