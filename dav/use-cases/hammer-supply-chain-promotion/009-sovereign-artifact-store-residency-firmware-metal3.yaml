    package physically reside inside the mandated jurisdiction, and that full provenance be retained
    for audit. The promotion must verify the artifact store residency and provenance completeness
    before admitting the package; if the store is out-of-jurisdiction the promotion cannot proceed.

    '
  actor:
    persona: compliance-auditor
    profile: sovereign
  intent: Promote a firmware package only into an in-jurisdiction, audit-complete controlled store
  success_criteria:
