  - Governance matrix additionally checks that the controlled artifact store is in the mandated jurisdiction
  - Residency of the artifact store is verified before the SoftwarePackage is admitted
  - Full provenance chain is retained and complete for audit before canonical transition
  - Compute.BareMetal.Metal3 consumes the package only from the in-jurisdiction store
  - 'Residency verification and provenance evidence are recorded on the admission crossing'
