handle: supply-chain-promotion/scan-job-deadline-timeout-vmware
scenario:
  description: 'An SRE promotes a new golden VM image destined for Compute.VM.VMware. The promotion
    pipeline dispatches a scan Automation.Job to the scanner discovery avenue, but the scanner is
    backlogged and the job does not return a verdict before its configured deadline. The pipeline must
    treat the missing verdict as a timeout rather than assuming success: the promotion is halted, the
    image is held at proposed, and the estate does not gain a consumable image on an unscanned artifact.
    The timeout is recorded so the promotion can be retried.

    '
  actor:
    persona: sre
    profile: standard
  intent: Promote a golden VM image whose CVE scan job never completes in time
  success_criteria:
  - Promotion dispatches a scan Automation.Job to the scanner discovery avenue
  - The scan job exceeds its deadline without returning a verdict
  - Pipeline treats the missing verdict as a timeout and does not assume the image is clean
  - Promotion halts with the SoftwareImage held at proposed, never reaching canonical
  - Compute.VM.VMware cannot consume the unscanned image
  - 'Timeout is recorded with the job id and deadline so the promotion can be retried'
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: orchestration_flow_static
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: timeout
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: scan Automation.Job dispatched to the scanner but returns no verdict before deadline
  - domain: policy
    interaction: missing scan verdict fails closed; promotion is not allowed to proceed
  - domain: data
    interaction: SoftwareImage remains proposed with no canonical transition
  - domain: audit
    interaction: scan-job timeout recorded with job id and deadline for retry
