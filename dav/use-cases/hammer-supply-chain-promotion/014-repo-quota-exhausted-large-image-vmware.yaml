scenario:
  description: 'An SRE promotes a large golden VM image (a multi-hundred-gigabyte appliance image) into
    the controlled repository for Compute.VM.VMware. All governance gates pass, but as the artifact is
    written to the controlled store the backing storage quota for the repo is exhausted before the
    upload completes. The pipeline must treat the exhausted store as a resource-exhaustion failure, not
    a policy failure: it aborts the write, does not leave a half-written canonical image, and surfaces
    the capacity condition so the store can be expanded and the promotion retried.

    '
  actor:
    persona: sre
    profile: standard
  intent: Promote a very large VM image but the controlled repo runs out of capacity mid-write
  success_criteria:
  - All governance gates pass before the artifact write begins
  - The controlled store quota is exhausted before the large image upload completes
  - The pipeline classifies this as resource exhaustion, distinct from a policy rejection
  - The write is aborted and no half-written image is left in canonical state
  - Compute.VM.VMware gains no partially uploaded image
  - 'Capacity condition and required headroom are recorded so the promotion can be retried'
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: resource_exhaustion
  profile: standard
  expected_domain_interactions:
  - domain: policy
    interaction: gates pass; failure is capacity, not a policy violation
  - domain: provider
    interaction: controlled store write aborts when quota is exhausted mid-upload
  - domain: data
    interaction: no partial SoftwareImage left canonical; repo integrity preserved
  - domain: audit
    interaction: resource-exhaustion condition and headroom needed recorded for retry
