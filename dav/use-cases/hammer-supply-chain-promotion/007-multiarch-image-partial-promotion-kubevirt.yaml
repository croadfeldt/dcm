scenario:
  description: 'A platform engineer promotes a multi-arch base container image (a manifest list covering
    amd64 and arm64) into the controlled repo for Compute.Container.KubeVirt. The amd64 variant scans
    clean, is signed, and passes all gates, but the arm64 variant fails its CVE scan on a high-severity
    finding. The pipeline must not admit the whole manifest list atomically as clean: it promotes the
    passing amd64 digest, holds the arm64 digest out of canonical, and marks the manifest as partially
    fulfilled so consumers on the failing architecture are not exposed.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Promote a multi-arch image where only one architecture variant passes scanning
  success_criteria:
  - Each architecture digest in the manifest list is scanned and gated independently
  - The amd64 variant passes all gates and is promoted to canonical
  - The arm64 variant fails its CVE scan and is not promoted to canonical
  - The manifest is recorded as partially fulfilled rather than admitted atomically as clean
  - Compute.Container.KubeVirt can consume amd64 but is blocked from the arm64 digest
  - Per-architecture scan verdicts and the partial outcome are recorded
