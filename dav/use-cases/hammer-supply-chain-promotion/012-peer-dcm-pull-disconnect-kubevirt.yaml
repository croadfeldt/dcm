scenario:
  description: 'A platform engineer federates an approved golden VM image from a peer DCM domain: the
    peer has already promoted and canonicalized the image in its own controlled repo, and the local
    estate wants to mirror it for Compute.VM.KubeVirt rather than re-vet from scratch. Mid-pull the
    peer DCM connection drops, so the artifact and its attestation transfer is incomplete. The pipeline
    must not admit a half-transferred image as canonical: it aborts the federation admission, keeps the
    local repo unchanged, and records the disconnect for retry.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Mirror a peer DCM approved image but the federation link drops mid-pull
  success_criteria:
  - Federation pull references the peer DCM canonical image and its attestation
  - Local admission requires the full artifact and attestation to transfer before canonicalizing
  - The peer DCM connection drops mid-pull, leaving the transfer incomplete
  - The pipeline aborts the admission rather than promoting a partial artifact
  - The local controlled repo is unchanged and Compute.VM.KubeVirt gains no new image
  - 'The peer disconnect is recorded with the peer identity so the pull can be retried'
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: peer_dcm_required
    governance_context: audit_heavy
    failure_mode: peer_dcm_disconnect
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: peer DCM federation pull dispatched but the link drops mid-transfer
  - domain: policy
    interaction: incomplete artifact/attestation fails admission; no canonical transition
  - domain: data
    interaction: local controlled repo left unchanged; no partial SoftwareImage written
  - domain: audit
    interaction: peer disconnect recorded with peer identity and pull state for retry
