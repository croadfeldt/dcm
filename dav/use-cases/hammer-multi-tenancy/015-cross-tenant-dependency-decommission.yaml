scenario:
  description: 'Tenant A owns a resource that tenant B''s resource hard-depends on via an authorized cross-tenant
    sharing grant. Tenant A requests decommission of that resource. The system must detect the live hard
    dependency held by tenant B and refuse to destroy the resource while B''s dependent remains, rather
    than leaving tenant B with a dangling hard dependency. This probes whether the decommission dependency
    check spans tenant boundaries when a sharing grant has created a legitimate cross-tenant edge.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Decommission a shared resource that another tenant hard-depends on
  success_criteria:
  - Decommission traversal finds the cross-tenant hard dependency held by tenant B
  - Destruction is blocked while tenant B's dependent is live
  - Tenant B is never left with a dangling hard dependency
  - Blocking rationale names the dependent resource and its tenant
  - Decommission can proceed only after the dependency is removed or migrated
  - The blocked decommission and cross-tenant dependency are recorded in audit
