uuid: uc-hammer-tenancy-012
handle: tenancy/tenant-scoped-audit-isolation
scenario:
  description: 'A compliance-auditor engaged by tenant A requests the audit trail for tenant A''s resources.
    The system must return only tenant A''s audit records and never expose events belonging to tenant
    B, even where the two tenants share an underlying pool or provider. This tests whether the audit domain
    is itself tenant-scoped — a leak in the audit view would undermine every other isolation guarantee,
    since audit records describe actions on the very resources isolation is meant to protect.

    '
  actor:
    persona: compliance-auditor
    profile: fsi
  intent: Retrieve a tenant-scoped audit trail without leaking other tenants' events
  success_criteria:
  - Audit query returns only tenant A's events
  - Events on shared pools appear only under the acting tenant's scope
  - No tenant B principal, resource, or action is disclosed to tenant A's auditor
  - Audit records retain enough detail to satisfy compliance without cross-tenant leakage
  - The auditor's own access to the audit trail is itself logged
  - Attempted access to tenant B's audit scope is denied and recorded
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: audit
    interaction: audit query scoped to the requesting tenant; shared-pool events attributed to the acting
      tenant
  - domain: policy
    interaction: audit-access rule limits the auditor to their engaged tenant scope
  - domain: data
    interaction: audit store filters events by owning tenant before return
