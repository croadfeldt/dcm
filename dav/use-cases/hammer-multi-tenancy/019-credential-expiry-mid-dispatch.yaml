uuid: uc-hammer-tenancy-019
handle: tenancy/credential-expiry-mid-dispatch
scenario:
  description: 'A tenant-scoped modification is dispatched to a provider using a tenant-issued credential
    that expires while the dispatch is in flight. The provider call fails on an expired credential. The
    system must fail the dispatch cleanly within the tenant''s scope, avoid partial cross-tenant state,
    refresh or re-request the tenant credential under a recovery policy, and never fall back to another
    tenant''s credential to complete the call. This tests credential isolation and recovery at the tenant
    boundary under a mid-flight expiry.

    '
  actor:
    persona: security-officer
    profile: prod
  intent: Recover a tenant dispatch when its credential expires mid-flight without cross-tenant fallback
  success_criteria:
  - Provider call failing on expired credential is detected mid-dispatch
  - The dispatch fails cleanly with no partial realized state committed
  - No other tenant's credential is used as a fallback to complete the call
  - Recovery policy refreshes or re-requests the tenant's own credential
  - The retried dispatch stays entirely within the original tenant scope
  - Credential expiry, failure, and recovery are recorded in the tenant's audit scope
  dimensions:
    lifecycle_phase: modification
    resource_complexity: composite_service
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: provider_failure
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: dispatch fails on expired tenant credential; no cross-tenant credential substituted
  - domain: policy
    interaction: recovery policy refreshes the tenant's own credential and retries within scope
  - domain: data
    interaction: no partial realized state persisted for the failed dispatch
  - domain: audit
    interaction: expiry, failure, and recovery recorded in the tenant audit scope
