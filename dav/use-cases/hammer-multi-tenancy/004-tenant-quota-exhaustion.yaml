uuid: uc-hammer-tenancy-004
handle: tenancy/tenant-quota-exhaustion
scenario:
  description: 'A tenant has a declared quota of resources of a given class. An application-team member
    submits a new request that would push the tenant over its quota. The system must evaluate the tenant''s
    aggregate consumption against the quota at admission and reject the request before dispatch, returning
    a clear over-quota verdict. This probes whether the architecture models per-tenant aggregate limits
    at all, or whether quota is external to UDLM/DCM and thus unenforceable at the intent boundary.

    '
  actor:
    persona: application-team-member
    profile: standard
  intent: Submit a request that exceeds the tenant's declared resource quota
  success_criteria:
  - Tenant's current aggregate consumption for the resource class is computed at admission
  - The would-be total is compared against the declared tenant quota
  - The over-quota request is rejected before any provider dispatch
  - Rejection states the quota, current usage, and requested delta
  - In-quota requests from the same tenant continue to succeed
  - The rejection is recorded in the tenant-scoped audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: aggregate tenant consumption tallied across realized resources of the class
  - domain: policy
    interaction: quota policy compares projected total against the tenant limit
  - domain: audit
    interaction: over-quota rejection recorded with usage figures
