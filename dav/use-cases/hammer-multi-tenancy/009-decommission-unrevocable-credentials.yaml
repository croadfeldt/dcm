uuid: uc-hammer-tenancy-009
handle: tenancy/decommission-unrevocable-credentials
scenario:
  description: 'Tenant A is being decommissioned. During credential teardown, one of its issued credentials
    was minted for a cross-tenant integration and is held by an external provider that is currently unreachable,
    so revocation cannot be confirmed. The system must not report the decommission as clean while a credential
    remains potentially live. It must record the credential as unrevoked, hold the decommission in a partial
    state pending confirmation, and surface the residual exposure. This tests whether decommission treats
    credential revocation as a first-class success condition, not a fire-and-forget.

    '
  actor:
    persona: security-officer
    profile: fsi
  intent: Decommission a tenant when one cross-tenant credential cannot be revoked
  success_criteria:
  - Decommission enumerates all credentials issued for or by the tenant
  - The unreachable provider's credential revocation is attempted and fails
  - Decommission does not report clean completion with a credential unrevoked
  - The residual live credential is recorded as an outstanding exposure
  - Decommission holds in a partial state pending revocation confirmation
  - A recovery action to retry revocation is scheduled and audited
  dimensions:
    lifecycle_phase: decommission
    resource_complexity: composite_service
    policy_complexity: recovery_policy
    provider_landscape: multiple_eligible
    governance_context: compliance_gated
    failure_mode: provider_failure
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: recovery policy blocks clean-decommission verdict while a credential is unrevoked
  - domain: provider
    interaction: revocation call to the unreachable provider fails and is marked outstanding
  - domain: data
    interaction: decommission held in partial state; residual credential exposure recorded
  - domain: audit
    interaction: unrevoked credential and scheduled retry captured as a compliance finding
