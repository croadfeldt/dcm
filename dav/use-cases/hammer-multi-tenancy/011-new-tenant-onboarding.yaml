handle: tenancy/new-tenant-onboarding
scenario:
  description: 'A tenant-admin onboards a brand-new tenant with no existing resources. The system must
    create the tenant scope, bind it to the default profile, and establish an empty ownership and audit
    boundary — a clean, simple happy path that establishes the isolation substrate every other tenancy
    case depends on. This validates that a tenant can be stood up as a first-class scope before any resource
    exists within it.

    '
  actor:
    persona: tenant-admin
    profile: dev
  intent: Onboard a new empty tenant scope bound to platform defaults
  success_criteria:
  - A new tenant scope is created with a unique identity
  - The tenant is bound to the default profile at creation
  - An empty ownership boundary and audit scope are established
  - No resources exist in the tenant immediately after onboarding
  - The tenant is queryable as an isolated scope from creation onward
  - Tenant creation is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: single_eligible
    governance_context: no_governance
    failure_mode: happy_path
  profile: dev
  expected_domain_interactions:
  - domain: data
    interaction: new tenant scope and empty ownership boundary created
  - domain: policy
    interaction: default profile bound to the tenant at creation
  - domain: audit
    interaction: tenant onboarding event recorded
