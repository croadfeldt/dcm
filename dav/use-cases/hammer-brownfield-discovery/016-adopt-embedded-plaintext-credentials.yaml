uuid: uc-hammer-brownfield-016
handle: brownfield-discovery/adopt-embedded-plaintext-credentials
scenario:
  description: 'A discovered application host carries embedded plaintext credentials in its config (a
    DB password, an API token) that the discovery source surfaced. On adoption, no plaintext secret may
    survive into the managed entity definition: each is converted to a vault-backed credential resource,
    the entity references the vault handle, and each converted secret is flagged for rotation because
    it was exposed. Adoption must fail closed if any detected plaintext cannot be vaulted. This validates
    the credential-hygiene obligation at the discovery-to-managed boundary — a hard requirement for FSI-grade
    brownfield onboarding.

    '
  actor:
    persona: security-officer
    profile: fsi
  intent: Adopt a discovered host while vaulting all embedded plaintext credentials
  success_criteria:
  - Every embedded plaintext credential surfaced by discovery is detected
  - Each is converted to a vault-backed credential resource referenced by handle from the entity
  - No plaintext credential survives into the managed entity definition
  - Each converted credential is flagged for rotation because it was exposed
  - Adoption fails closed if any detected plaintext cannot be vaulted
  - Each detection, conversion, and rotation flag is recorded in the audit trail
  dimensions:
    lifecycle_phase: brownfield_ingestion
    resource_complexity: hard_dependencies
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: provider
    interaction: discovery source surfaces embedded plaintext credentials on the host
  - domain: data
    interaction: credentials converted to vault-backed resources; entity holds only vault handles
  - domain: policy
    interaction: credential-hygiene policy enforces no-plaintext and rotation flags, failing closed
  - domain: audit
    interaction: detection, conversion, and rotation flags recorded
