handle: sovereignty/residency-tag-validation-single-vm
scenario:
  description: 'An application team member requests a single virtual machine with no dependencies, tagged
    with a required residency jurisdiction from a sovereign mandate. The system must validate that the
    residency tag is well-formed and resolvable against a known jurisdiction, place the VM on a provider
    in that jurisdiction, and stamp the realized record with where it landed. This is the simplest sovereign
    case — one resource, one residency tag, one validation — and establishes that a bare residency attribute
    is honored end to end.

    '
  actor:
    persona: application-team-member
    profile: sovereign
  intent: Provision one residency-tagged VM in the correct jurisdiction
  success_criteria:
  - The residency tag is validated as well-formed and resolvable to a known jurisdiction
  - Placement selects a provider in the tagged jurisdiction
  - The VM is realized on that provider
  - The realized record is stamped with the jurisdiction it was placed in
  - The residency validation and placement are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: data
    interaction: residency tag stored and validated against known jurisdictions
  - domain: policy
    interaction: single residency validation confirms the tag before placement
  - domain: provider
    interaction: provider in the tagged jurisdiction realizes the VM
  - domain: audit
    interaction: residency validation and placement recorded
