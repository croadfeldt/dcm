handle: sovereignty/data-at-rest-named-jurisdiction
scenario:
  description: 'A tenant admin submits a new request for an object-storage bucket that must keep all data-at-rest
    within a specifically named jurisdiction dictated by a sovereign mandate. The request carries the
    jurisdiction as a hard residency attribute. The placement engine must select only a provider whose
    declared data-at-rest jurisdiction matches the named mandate, realize the bucket there, and stamp
    the realized record with the jurisdiction it was placed in. This is the baseline sovereign-placement
    happy path that everything else builds on.

    '
  actor:
    persona: tenant-admin
    profile: sovereign
  intent: Provision storage whose data-at-rest stays in one named jurisdiction
  success_criteria:
  - Request is accepted with the named jurisdiction as a hard residency attribute
  - Sovereignty policy filters candidate providers to those matching the named jurisdiction
  - The bucket is realized only on a provider whose data-at-rest jurisdiction matches
  - The realized record records the concrete jurisdiction of placement
  - Placement decision and the satisfied mandate are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: data
    interaction: named jurisdiction stored as a hard residency attribute on intent
  - domain: policy
    interaction: sovereignty validation filters providers to the matching jurisdiction
  - domain: provider
    interaction: compliant provider realizes the bucket and returns its jurisdiction
  - domain: audit
    interaction: placement and satisfied mandate recorded
