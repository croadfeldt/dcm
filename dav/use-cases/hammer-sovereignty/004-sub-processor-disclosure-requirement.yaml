uuid: uc-hammer-sovereignty-004
handle: sovereignty/sub-processor-disclosure-requirement
scenario:
  description: 'A security officer provisions a composite analytics service under a sovereign mandate
    that requires full disclosure of every sub-processor touching the data — not just the primary provider,
    but any downstream provider it delegates storage, key management, or compute to. The placement engine
    must resolve the primary provider''s declared sub-processor chain, evaluate each sub-processor''s
    jurisdiction against the mandate, and admit the service only if the entire chain is disclosed and
    compliant. An undisclosed or non-compliant sub-processor anywhere in the chain must block admission.
    This probes whether the model reasons about transitive provider delegation, not just the provider
    it dispatches to directly.

    '
  actor:
    persona: security-officer
    profile: sovereign
  intent: Provision a service only if its full sub-processor chain is disclosed and compliant
  success_criteria:
  - The primary provider's declared sub-processor chain is resolved from the provider model
  - Every sub-processor's jurisdiction is evaluated against the sovereign mandate
  - Admission proceeds only when the entire chain is disclosed and compliant
  - An undisclosed or non-compliant sub-processor anywhere in the chain blocks admission
  - The evaluated sub-processor chain is recorded with each member's jurisdiction
  - The disclosure evaluation and its verdict are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: multi_policy_chain
    provider_landscape: mixed
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: provider
    interaction: primary provider's sub-processor chain resolved transitively
  - domain: policy
    interaction: multi-policy chain evaluates each sub-processor's jurisdiction against the mandate
  - domain: data
    interaction: evaluated chain and per-member jurisdictions recorded on the resource
  - domain: audit
    interaction: sub-processor disclosure evaluation and verdict recorded
