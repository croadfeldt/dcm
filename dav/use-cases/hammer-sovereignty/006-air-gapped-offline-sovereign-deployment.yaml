  - Policy evaluation and placement complete with no external control-plane calls
  - No telemetry, registry, or control-plane egress leaves the enclave at any step
  - Orchestration proceeds via a static in-enclave flow with no peer DCM dependency
  - The disconnected realization arc is recorded in an in-enclave audit trail
  - No pipeline step blocks waiting on an unreachable external service
