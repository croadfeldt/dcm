    the entire pipeline — intent, policy evaluation, placement, and realization — using only in-enclave
    providers and a static orchestration flow, with no calls to outside services and no dependence on
    a reachable peer DCM. This probes whether the model can operate fully disconnected, and whether any
    step implicitly assumes external reachability.

    '
  actor:
