handle: sovereignty/government-access-risk-gating-placement
scenario:
  description: 'A security officer requests placement of a regulated dataset. Two providers can technically
    host it and both keep data-at-rest in the correct jurisdiction, but one is subject to a foreign government-access
    regime (a lawful-access statute reaching data held by that provider''s parent). The sovereign mandate
    treats government-access risk as a first-class placement gate, not just physical residency. The placement
    engine must score each eligible provider on government-access exposure and exclude the exposed provider
    even though it satisfies physical residency, selecting only the provider with acceptable access risk.
    This probes whether the model can gate on legal-reach risk distinct from geographic data-at-rest.

    '
  actor:
    persona: security-officer
    profile: sovereign
  intent: Place a regulated dataset only on a provider with acceptable government-access risk
  success_criteria:
  - Both candidate providers pass the physical data-at-rest residency check
  - Sovereignty policy additionally evaluates government-access exposure per provider
  - The provider under a foreign lawful-access regime is excluded despite passing residency
  - The dataset is realized only on the provider with acceptable access risk
  - The access-risk rationale for exclusion is recorded distinctly from residency
  - Placement decision and access-risk scoring recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: cross_domain_constraint
    provider_landscape: multiple_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: sovereignty gate scores government-access exposure separately from residency
  - domain: provider
    interaction: provider legal-reach attributes read; exposed provider excluded from candidates
  - domain: data
    interaction: access-risk rationale recorded on the placement decision
  - domain: audit
    interaction: access-risk scoring and exclusion recorded distinctly from residency
