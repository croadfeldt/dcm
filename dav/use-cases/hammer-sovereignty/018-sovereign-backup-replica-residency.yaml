uuid: uc-hammer-sovereignty-018
handle: sovereignty/sovereign-backup-replica-residency
scenario:
  description: 'A platform engineer provisions a database with a DR requirement: it needs backups and
    a standby replica. The sovereign mandate requires that not only the primary but every backup and replica
    keep data-at-rest within the mandated jurisdiction. The architecture must apply the residency constraint
    to the derived backup and replica resources, not just the primary — placing the standby replica and
    backup targets on in-jurisdiction providers. A DR topology that would land a replica or backup out
    of jurisdiction must be rejected. This probes whether residency propagates to dependent DR resources
    rather than applying only to the primary.

    '
  actor:
    persona: platform-engineer
    profile: sovereign
  intent: Ensure primary, replica, and backups all stay in the mandated jurisdiction
  success_criteria:
  - The residency constraint is propagated to the derived backup and replica resources
  - The primary, standby replica, and backup targets are all placed in-jurisdiction
  - A DR topology that would place any replica or backup out of jurisdiction is rejected
  - Each derived resource's realized record is stamped with its jurisdiction
  - The propagation of residency to derived resources is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: residency validation applied to primary and to derived backup and replica resources
  - domain: provider
    interaction: primary, replica, and backup targets realized on in-jurisdiction providers
  - domain: data
    interaction: residency propagated to derived resources; each stamped with its jurisdiction
  - domain: audit
    interaction: residency propagation and per-resource placement recorded
