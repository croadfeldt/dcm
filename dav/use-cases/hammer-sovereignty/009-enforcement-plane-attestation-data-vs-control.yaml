  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: sovereignty policy evaluates data-plane and control-plane attestations independently
  - domain: provider
    interaction: per-plane attestations read; provider failing control-plane residency rejected
  - domain: data
    interaction: per-plane attestation results recorded distinctly on the resource
  - domain: audit
    interaction: rejection recorded naming the failing plane
