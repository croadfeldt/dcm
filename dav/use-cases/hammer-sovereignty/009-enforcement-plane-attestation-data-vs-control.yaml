handle: sovereignty/enforcement-plane-attestation-data-vs-control
scenario:
  description: 'A security officer provisions a service under a sovereign mandate that distinguishes the
    data plane from the control plane: the data-at-rest must reside in-jurisdiction AND the control plane
    operating that data (the management endpoints, orchestration, and operators able to act on it) must
    also be in-jurisdiction. A candidate provider keeps data in-jurisdiction but is operated from a control
    plane in another country. The architecture must require attestation for both planes, evaluate them
    independently, and refuse a provider that satisfies data-plane residency but fails control-plane residency.
    This probes whether the model treats sovereignty as a per-plane property with independent attestation,
    rather than a single data-location flag.

    '
  actor:
    persona: security-officer
    profile: sovereign
  intent: Require in-jurisdiction attestation for both the data plane and the control plane
  success_criteria:
  - The mandate is expressed as separate data-plane and control-plane residency requirements
  - Sovereignty policy requires an attestation for each plane independently
  - A provider passing data-plane residency but failing control-plane residency is rejected
  - The service is realized only on a provider attesting both planes in-jurisdiction
  - The per-plane attestation results are recorded distinctly, not collapsed to one flag
  - The rejection rationale names the failing plane in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: cross_domain_constraint
    provider_landscape: mixed
    governance_context: sovereignty_enforced
