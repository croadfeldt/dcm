uuid: uc-hammer-networking-001
handle: networking/vlan-create-simple
scenario:
  description: 'A platform engineer requests a single VLAN segment (id 90, "storage") on the lab fabric
    with no dependents and no upstream references. The system must mint one Network.VLAN record carrying
    its vlan id and optional fabric scope, and realize it through the network provider. This is the baseline
    segment-creation path — the simplest possible network resource — and it establishes that a segment
    is a first-class managed record, not an attribute buried inside a host config.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Create a single standalone VLAN segment on the fabric
  success_criteria:
  - Network.VLAN record is created with a stable UUID
  - The record captures the vlan id and (optional) fabric/cluster scope
  - Provider realizes the segment on the target fabric
  - Realized state confirms the segment exists and is reachable for later binding
  - No dependents are required and none are fabricated
  - Creation event is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: Network.VLAN intent recorded with vlan id and scope
  - domain: provider
    interaction: network provider realizes the segment on the fabric
  - domain: audit
    interaction: segment creation recorded
