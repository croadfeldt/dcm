scenario:
  description: 'An application team member provisions one small VM with no dependencies under standard
    governance. The architecture must produce exactly one coherent audit record for the request that captures
    the actor, the intent submitted, the policy evaluation outcome, the provider dispatched to, and the
    realized result — timestamped and durably stored. This is the baseline happy-path audit contract every
    heavier scenario builds on: one request in, one complete and correct audit record out.

    '
