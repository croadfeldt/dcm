    persona: application-team-member
    profile: standard
  intent: Provision a simple resource and get one complete, correct audit record
  success_criteria:
  - Exactly one audit record is produced for the request
  - The record captures the requesting actor and the submitted intent
  - The policy evaluation outcome is recorded
  - The dispatched provider and realized result are recorded
  - The record carries a durable, monotonic timestamp
  - The record is retrievable by request id after completion
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
