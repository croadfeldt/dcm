uuid: uc-hammer-audit-007
handle: audit/compliance-gate-blocks-nonconformant
scenario:
  description: 'A tenant admin submits a request to provision an unencrypted object store in a regulated
    FSI profile that mandates encryption at rest. A compliance gate must evaluate the request before any
    provider dispatch, find it non-conformant, and block it — returning a specific denial that names the
    violated control, not a generic error. No provider call may occur for a blocked request. The denial
    and its rationale must be audited. This tests that compliance is an enforced pre-dispatch gate, not
    an after-the-fact report.

    '
  actor:
    persona: tenant-admin
    profile: fsi
  intent: Verify a non-conformant request is blocked at the compliance gate pre-dispatch
  success_criteria:
  - The compliance gate evaluates the request before any provider dispatch
  - The non-conformant request is denied, not realized
  - The denial names the specific violated control (encryption-at-rest)
  - No provider call occurs for the blocked request
  - The block decision and rationale are recorded in the audit trail
  - A corrected, conformant resubmission is admitted and proceeds
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: compliance gate evaluates conformance and blocks the request
  - domain: provider
    interaction: no dispatch occurs for the blocked request
  - domain: audit
    interaction: block decision recorded with the violated control named
