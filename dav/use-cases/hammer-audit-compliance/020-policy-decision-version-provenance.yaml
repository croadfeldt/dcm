uuid: uc-hammer-audit-020
handle: audit/policy-decision-version-provenance
scenario:
  description: 'A policy set is revised on a Tuesday. A request evaluated the previous Friday was allowed
    under the older rules; an auditor now asks why it was allowed. The architecture must reproduce the
    decision against the exact policy version and inputs in force at evaluation time — not the current
    policy set — and record which policy version, which rule, and which inputs produced the outcome. Evaluating
    an old decision against today''s rules would be a false reconstruction. This tests whether policy-decision
    provenance is versioned and replayable as-of the decision.

    '
  actor:
    persona: compliance-auditor
    profile: prod
  intent: Explain a past allow decision against the policy version in force at the time
  success_criteria:
  - The audit record identifies the policy version used for the evaluation
  - The specific rule that produced the outcome is identified
  - The decision inputs at evaluation time are captured
  - The decision is reproducible against the as-of policy version, not the current one
  - Replaying against the current policy set does not overwrite the original outcome
  - A later policy change does not retroactively alter the recorded decision
  dimensions:
    lifecycle_phase: modification
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: as-of policy version and rule resolved for the past decision
  - domain: audit
    interaction: decision inputs and policy version recorded for replayable provenance
