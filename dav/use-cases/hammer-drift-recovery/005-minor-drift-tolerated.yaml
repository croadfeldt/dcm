scenario:
  description: 'A dev-profile application team runs a reconciliation pass on a sandbox service. Discovery
    reports that a provider-assigned tag was normalized to lowercase and a last-seen timestamp advanced
    — cosmetic fields outside the declared intent. The engine must classify this divergence as minor drift
    under the severity model, record it, and deliberately tolerate it: no remediation, no escalation.
    This validates that drift severity classification exists and that a minor class exists which the system
    can choose not to act on.

    '
