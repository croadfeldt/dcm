    profile: dev
  intent: Confirm that cosmetic minor drift is classified and tolerated without remediation
  success_criteria:
  - Discovery reports divergence only on cosmetic, non-intent-governed fields
  - The engine classifies the divergence as minor severity
  - The classification rationale (fields are outside declared intent) is captured
  - No remediation action is generated
  - No escalation is raised
  - The tolerated minor-drift result is recorded in the audit trail
  dimensions:
    lifecycle_phase: drift_detection
