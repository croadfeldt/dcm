handle: drift-recovery/fleet-wide-drift-sweep-reconcile
scenario:
  description: 'An SRE launches a scheduled fleet-wide reconciliation across a full-stack estate spanning
    many resources and providers. The engine must discover every resource, diff each against its immutable
    Realized snapshot, classify each drift by severity, and apply the governance matrix uniformly: tolerate
    minor, auto-remediate significant, and freeze-and-escalate critical — all within one sweep, producing
    a consolidated drift report. This validates that detection, severity classification, and policy-driven
    response compose at fleet scale without per-resource special-casing, and that the sweep terminates
    with an actionable summary.

    '
  actor:
    persona: sre
    profile: prod
  intent: Run a fleet-wide drift sweep that classifies and responds to each resource under one governance
    matrix
  success_criteria:
  - Every in-scope resource is discovered and diffed against its immutable Realized snapshot
  - Each detected drift is classified by severity (minor, significant, critical)
  - The governance matrix is applied uniformly across the fleet
  - Minor drift is tolerated, significant is auto-remediated, critical is frozen and escalated
  - A consolidated drift report summarizes findings and actions per resource
  - The sweep terminates with per-resource outcomes recorded in the audit trail
  dimensions:
    lifecycle_phase: drift_detection
    resource_complexity: composite_service
    policy_complexity: governance_matrix_enforcement
    provider_landscape: mixed
    governance_context: audit_heavy
    failure_mode: data_inconsistency
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: every resource discovered across mixed providers in one sweep
  - domain: data
    interaction: each resource diffed against its immutable Realized snapshot
  - domain: policy
    interaction: governance matrix classifies severity and selects response per resource
  - domain: audit
    interaction: consolidated drift report and per-resource outcomes recorded
