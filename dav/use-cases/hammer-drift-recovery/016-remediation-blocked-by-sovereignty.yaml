scenario:
  description: 'A security officer on a sovereign profile reconciles a residency-pinned dataset that drifted
    when a provider replicated it to an out-of-jurisdiction cache. The obvious remediation — re-dispatch
    the original intent — would itself require touching the non-compliant region to tear down the errant
    replica, but the sovereignty policy forbids any operation that acts on data in that region. The engine
    must detect the drift, attempt remediation, find that the corrective action is itself blocked by sovereignty,
    and escalate to a human rather than either leaving the violation live or breaching residency to fix
    it. This probes the tension when the remedy conflicts with a hard constraint.

    '
  actor:
    persona: security-officer
    profile: sovereign
  intent: Remediate a residency drift where the corrective action is itself blocked by sovereignty
  success_criteria:
  - Drift detected as an out-of-jurisdiction replica of a residency-pinned dataset
  - The engine selects remediation to remove the errant replica
  - Sovereignty policy blocks the corrective action because it operates in the forbidden region
  - The engine does not breach residency to perform the fix
  - The unremediable violation is escalated to a human owner with full context
  - Drift, blocked remediation, and escalation are recorded in the audit trail
  dimensions:
    lifecycle_phase: drift_detection
    resource_complexity: composite_service
