    interaction: out-of-jurisdiction replica detected against the residency-pinned Realized snapshot
  - domain: policy
    interaction: recovery policy selects a fix that sovereignty then blocks; escalation raised
  - domain: provider
    interaction: corrective dispatch withheld to avoid operating in the forbidden region
  - domain: audit
    interaction: drift, blocked remediation, and human escalation recorded
