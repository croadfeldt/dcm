uuid: uc-hammer-day0-day2-ops-012
handle: day0-day2-ops/firmware-update-baremetal-provider-failure
scenario:
  description: A platform engineer schedules a BIOS/BMC firmware update on a bare-metal host inside a
    maintenance window, run as an Automation.Job bound to that host. The provider fails mid-flash — the
    flash aborts and the host is in a fragile firmware state. The system must treat this as a provider_failure,
    invoke recovery (fall back to the backup firmware bank / retry the flash), keep the host cordoned
    inside the window, and not report the update succeeded while the host is unhealthy.
  actor:
    persona: platform-engineer
    profile: prod
  intent: Update bare-metal firmware in a window and recover from a mid-flash provider failure
  success_criteria:
  - The firmware job is bound to the bare-metal host and runs only inside the maintenance window
  - A mid-flash provider failure is recorded as a provider_failure, not a success
  - 'Recovery fires: fall back to the backup firmware bank or retry the flash'
  - The host stays cordoned until it returns to a healthy firmware state
  - No success is reported while the host firmware state is fragile/unverified
  - The failure and recovery actions are recorded in the audit trail
  dimensions:
    lifecycle_phase: modification
    resource_complexity: hard_dependencies
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: provider_failure
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: runs the firmware flash, reports mid-flash failure, executes bank fallback/retry
  - domain: policy
    interaction: confines the job to the window and mandates recovery on provider failure
  - domain: data
    interaction: records the fragile firmware state and the recovered state
  - domain: audit
    interaction: records the provider failure and the recovery actions
