handle: day0-day2-ops/backup-then-restore-rehydration-faithful
scenario:
  description: 'An SRE takes a scheduled backup of a stateful FSI database via an Automation.Job bound
    to that database, producing a restore point. Later the database is corrupted, and a restore process
    rehydrates it faithfully from that backup — same identity, same provider, byte-faithful state as of
    the restore point. This is a two-process arc: the backup process produces the artifact the restore
    process consumes, both bound to the same resource identity.'
  actor:
    persona: sre
    profile: fsi
  intent: Back up a stateful resource and later faithfully rehydrate it from that backup
  success_criteria:
  - The backup job is bound to the database and produces a referenceable restore point
  - The restore process consumes exactly that restore-point artifact
  - 'Rehydration is faithful: same resource identity and same owning provider'
  - The rehydrated state matches the backup as of the restore-point timestamp
  - Backup and restore are recorded as two bound processes over one resource identity
  - The chain of custody from backup artifact to restore is auditable
  dimensions:
    lifecycle_phase: rehydration_faithful
    resource_complexity: hard_dependencies
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: provider
    interaction: runs the backup job and later the faithful restore against the same database
  - domain: data
    interaction: records the restore point and re-establishes the rehydrated realized state
  - domain: policy
    interaction: enforces the FSI backup/restore policy chain (retention, integrity check)
  - domain: audit
    interaction: records the backup artifact chain of custody through to restore
