uuid: uc-hammer-day0-day2-ops-005
handle: day0-day2-ops/upgrade-job-exceeds-deadline-timeout
scenario:
  description: 'An SRE launches a major in-place upgrade of a large storage appliance as a long-running
    Automation.Job bound to that appliance, with a hard maintenance-window deadline. The job runs past
    the deadline without reaching a terminal outcome. The system must enforce the deadline: cancel/time-out
    the process, record a terminal TIMEOUT rather than leaving it RUNNING forever, and flag the appliance
    as in an indeterminate upgrade state needing operator inspection before any retry.'
  actor:
    persona: sre
    profile: prod
  intent: Enforce a deadline on a long-running upgrade job and record a terminal timeout
  success_criteria:
  - The upgrade job is bound to the appliance and carries an explicit deadline
  - When the deadline passes with no terminal outcome, the process is timed out
  - The process records a terminal TIMEOUT/CANCELLED outcome, never an eternal RUNNING
  - The appliance is flagged as in an indeterminate upgrade state pending inspection
  - No automatic retry fires until an operator clears the indeterminate flag
  - The deadline breach and forced termination are recorded in the audit trail
  dimensions:
    lifecycle_phase: modification
    resource_complexity: hard_dependencies
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: timeout
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: runs the upgrade job and is signalled to cancel on deadline breach
  - domain: policy
    interaction: enforces the maintenance-window deadline and the no-auto-retry gate
  - domain: data
    interaction: records the terminal timeout and the indeterminate appliance state
  - domain: audit
    interaction: records the deadline breach and forced termination
