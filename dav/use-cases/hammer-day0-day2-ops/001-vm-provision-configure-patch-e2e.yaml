handle: day0-day2-ops/vm-provision-configure-patch-e2e
scenario:
  description: A platform engineer requests a standard application VM and expects it carried the whole
    way from bare provision to a patched, running host. Day 0 realizes the VM resource on the owning hypervisor
    provider; Day 1 fires an Automation.AnsiblePlaybook bound to that VM to install the base role and
    app runtime; Day 2 runs an Automation.Job that applies the current security patch set. The two processes
    operate on the same realized VM — they are bound to it, not containers of it — and each run must record
    a terminal outcome (COMPLETED) against the resource it converged.
  actor:
    persona: platform-engineer
    profile: standard
  intent: Provision a VM and carry it end to end through configuration and its first patch cycle
  success_criteria:
  - Day 0 realizes the VM resource and records its provider-assigned UUID
  - The configure playbook is bound to the realized VM and runs to a COMPLETED terminal outcome
  - The patch job is bound to the same VM UUID and does not create a new resource
  - Each process run records a terminal outcome (COMPLETED/FAILED/CANCELLED), never a maintained state
  - The resource-to-process bindings are represented as bound-to edges, not containment
  - The full Day 0 -> Day 1 -> Day 2 arc is captured in the audit trail as one lineage
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: orchestration_flow_static
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: hypervisor realizes the VM, then executes the bound configure playbook and patch job
  - domain: data
    interaction: records the VM resource and the bound-to edges to both process runs
  - domain: policy
    interaction: validates the provision request and admits the Day 2 patch under the standard change
      policy
  - domain: audit
    interaction: records the provision, configure, and patch as one end-to-end lineage
