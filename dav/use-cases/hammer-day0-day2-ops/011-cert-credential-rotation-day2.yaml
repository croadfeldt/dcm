handle: day0-day2-ops/cert-credential-rotation-day2
scenario:
  description: A security officer rotates the TLS certificate and service credential on a running FSI
    API gateway without downtime. A day-2 Automation.Job bound to the gateway installs the new cert/credential
    and reloads the service in place. The gateway resource identity is unchanged — the process operates
    on the running resource; the multi-policy chain enforces validity dating, key strength, and that the
    old credential is revoked only after the new one is confirmed live.
  actor:
    persona: security-officer
    profile: fsi
  intent: Rotate a running resource cert/credential in place via a bound day-2 process
  success_criteria:
  - The rotation job is bound to the running gateway and runs in place
  - The gateway resource identity is unchanged by the rotation
  - The new certificate/credential is validated (validity dates, key strength) before install
  - The old credential is revoked only after the new one is confirmed live
  - The rotation runs to a COMPLETED terminal outcome with no service replacement
  - The rotation and revocation are recorded in the audit trail
  dimensions:
    lifecycle_phase: modification
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: enforces the cert/credential validity and revoke-after-confirm policy chain
  - domain: provider
    interaction: runs the in-place rotation and service reload on the gateway
  - domain: data
    interaction: records the new credential binding against the unchanged resource identity
  - domain: audit
    interaction: records the rotation and the post-confirm revocation
