uuid: uc-hammer-dr-rehydration-020
handle: dr-rehydration/credential-expiry-mid-rehydration
scenario:
  description: 'Because the disaster predates the recovery by weeks, the credential the DCM held for a
    provider has expired by the time rehydration runs — a realistic DR failure where secrets rotate on
    a schedule that outlives the workload''s downtime. Mid-plan, the provider dispatch for one resource
    is rejected with an authentication failure. The system must distinguish an expired-credential failure
    from a genuine provider outage or a policy denial, avoid retrying blindly into a lockout, pause the
    affected resource, and escalate for credential refresh rather than corrupting state or abandoning
    the whole rebuild. Resources not needing that credential should continue. This tests recovery-time
    credential lifecycle and human escalation.

    '
  actor:
    persona: platform-engineer
    profile: prod
  intent: Rehydrate when a provider credential has expired during the outage
  success_criteria:
  - Provider dispatch fails with an authentication error for the affected resource
  - The system classifies it as credential expiry, distinct from provider outage or policy denial
  - It does not retry blindly into a provider account lockout
  - The affected resource is paused and escalated for credential refresh
  - Resources not dependent on the expired credential continue to rehydrate
  - After refresh the paused resource resumes without restarting the whole rebuild
  dimensions:
    lifecycle_phase: rehydration_faithful
    resource_complexity: composite_service
    policy_complexity: human_escalation_required
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: provider_failure
  profile: prod
  expected_domain_interactions:
  - domain: provider
    interaction: dispatch rejected with auth error; classified as credential expiry
  - domain: policy
    interaction: escalation policy pauses the resource and requests credential refresh
  - domain: data
    interaction: per-resource rehydration status tracked for clean resume after refresh
  - domain: audit
    interaction: expiry classification, escalation, and resumption recorded
