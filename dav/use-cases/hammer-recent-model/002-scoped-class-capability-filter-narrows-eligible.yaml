handle: recent-model/scoped-class-capability-filter-narrows-eligible
scenario:
  description: "An SRE requests a Compute instance whose requirements include an accelerator class and\
    \ a hard\n    anti-affinity dependency on an existing tenant workload. Two Provider Classes advertise\
    \ Compute.VM,\n    but only one advertises the accelerator capability, so requirement-vs-capability\
    \ filtering collapses\n    the eligible set from two to one before policy even runs. The surviving\
    \ Provider Class can place the\n    instance but cannot honor the anti-affinity across every zone,\
    \ so the request is realized in a reduced\n    footprint. This stresses that capability filtering\
    \ happens at Class-resolution time and that a\n    dependency the resolved Provider Class only partly\
    \ satisfies yields partial fulfillment, not a silent\n    full success."
  actor:
    persona: sre
    profile: standard
  intent: Resolve a Compute request with an accelerator requirement and a hard dependency the eligible
    Provider Class only partly satisfies
  success_criteria:
  - Requirement-vs-capability filtering removes the Provider Class lacking the accelerator capability
  - Exactly one Provider Class survives Class resolution and is selected
  - The hard anti-affinity dependency is evaluated against the resolved Provider Class's real placement
    options
  - The request is realized only in the footprint the Provider Class can honor, flagged partial
  - The unmet portion of the dependency is reported, not silently dropped
  - Audit records both the capability-filtered candidate and the partial-fulfillment reason
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: cross_domain_constraint
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: partial_fulfillment
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: the request's accelerator requirement and anti-affinity dependency are read against Provider
      Class capabilities
  - domain: policy
    interaction: a cross-domain constraint checks the anti-affinity dependency against the resolved placement
  - domain: provider
    interaction: the single surviving Provider Class realizes what it can and returns the unmet remainder
  - domain: audit
    interaction: the capability filter outcome and partial-fulfillment reason are recorded
