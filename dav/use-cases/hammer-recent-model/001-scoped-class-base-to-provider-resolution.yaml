handle: recent-model/scoped-class-base-to-provider-resolution
scenario:
  description: "A platform engineer submits a request against the Base Class Compute with only outcome-level\n\
    \    requirements (vCPU, memory, a durable local disk) and no provider named. The substrate must resolve\n\
    \    the request down the Class hierarchy Base(Compute) -> Type(Compute.VM) -> Provider Class\n  \
    \  (Compute.VM.OCPVirt vs Compute.VM.Libvirt) -> a concrete instance, choosing across the eligible\
    \ set\n    by intersecting stated requirements with each Provider Class's advertised capability and\
    \ the governing\n    policy. This probes that resolution is stepwise and driven by requirements plus\
    \ advertised capability,\n    not by a hard-coded provider binding at the Base Class."
  actor:
    persona: platform-engineer
    profile: prod
  intent: Provision a Compute instance stated only at the Base Class, resolved down to a Provider Class
    by capability and policy
  success_criteria:
  - The request is accepted at Base Class Compute with no provider named
  - Resolution proceeds Base -> Type -> Provider Class -> instance in discrete, inspectable steps
  - Each candidate Provider Class is scored by intersecting requirements with its advertised capability
  - Governing policy narrows the eligible Provider Class set before selection
  - The selected instance satisfies every stated requirement and records the resolution path
  - The chosen Provider Class and the rejected alternatives are captured in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: data
    interaction: the Base Class request and the Base/Type/Provider Class definitions are read to build
      the resolution tree
  - domain: policy
    interaction: policy narrows the eligible Provider Class set by requirement-vs-capability constraints
  - domain: provider
    interaction: each eligible Provider Class advertises capability and the winner realizes the instance
  - domain: audit
    interaction: the full resolution path and rejected candidates are recorded
