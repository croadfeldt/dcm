scenario:
  description: "A platform engineer provisions a sovereign workload whose placement policy needs the residency\
    \ of\n    the DataCenter it will run in. Rather than the requester restating residency, the pipeline\
    \ projects\n    it via the navigational coordinate self.datacenter.residency, pulling the residency\
    \ field from the\n    related DataCenter entity into the request at evaluation time. The dereference\
    \ is governed: the\n    projection is only permitted because policy authorizes reading residency across\
    \ that relation. This\n    probes that a field can be injected FROM a related entity INTO the pipeline\
    \ by coordinate, and that\n    the cross-entity read is policy-governed rather than free."
  actor:
    persona: platform-engineer
    profile: sovereign
  intent: Project the DataCenter residency onto a sovereign workload via self.datacenter.residency at
    evaluation time
  success_criteria:
  - The projection self.datacenter.residency resolves to the related DataCenter's residency value
  - The residency is injected into the request pipeline, not restated by the requester
  - The cross-entity dereference is authorized by policy before the value is read
  - The placement decision uses the projected residency
  - The projected value's provenance (source entity and field path) is retained
  - The governed dereference is recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: composite_service
    policy_complexity: cross_domain_constraint
    provider_landscape: single_eligible
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: data
    interaction: self.datacenter.residency is dereferenced from the related DataCenter entity
  - domain: policy
    interaction: policy authorizes the cross-relation read and applies the projected residency to placement
  - domain: provider
    interaction: the eligible provider places the workload consistent with the projected residency
  - domain: audit
    interaction: the governed dereference and its provenance are recorded
