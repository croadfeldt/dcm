    interaction: the covers set and applies_on process are intersected to select contributing layers
  - domain: policy
    interaction: the static orchestration flow evaluates the injected layer values in order
  - domain: provider
    interaction: the injected values shape placement across the eligible set
  - domain: audit
    interaction: the from_layers set and injection intersection are recorded
