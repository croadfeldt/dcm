scenario:
  description: "A platform engineer provisions a composite service; a data layer targets the entity via\
    \ covers\n    (it covers all Compute.VM in the tenant) and targets the provisioning process via applies_on\
    \ (it\n    applies on the new_request process). Injection into the request is the INTERSECTION of\
    \ the two: the\n    layer contributes its values only where an entity it covers meets a process it\
    \ applies_on. A second\n    layer that covers the entity but applies_on decommission is correctly\
    \ NOT injected into this\n    new_request. This probes that layer injection is the covers-and-applies_on\
    \ intersection over the\n    from_layers set."
  actor:
    persona: platform-engineer
    profile: prod
  intent: Inject layer values into a request only where covers (entity) and applies_on (process) intersect
  success_criteria:
  - The layer covers the target entity (all Compute.VM in the tenant)
  - The layer applies_on the new_request process
  - Injection contributes the layer's values at the covers-and-applies_on intersection
  - A layer that covers the entity but applies_on decommission is not injected into new_request
  - The injected value set is attributed to its source layer
  - The from_layers set and the intersection outcome are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
