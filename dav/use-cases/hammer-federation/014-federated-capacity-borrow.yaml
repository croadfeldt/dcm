uuid: uc-hammer-federation-014
handle: federation/federated-capacity-borrow
scenario:
  description: 'Local capacity is exhausted and a finance-approved burst policy allows borrowing compute
    from a peer DCM up to a bounded quota. A platform engineer submits an order the local estate cannot
    place; the placement engine, seeing local exhaustion and a valid borrow authorization, routes the
    overflow to an eligible peer within the borrow quota and attributes the borrowed usage back for chargeback.
    Exceeding the borrow quota must be denied. This tests federated capacity borrowing as a policy-bounded
    overflow to a peer provider.

    '
  actor:
    persona: finance-analyst
    profile: prod
  intent: Borrow bounded compute capacity from a peer DCM when local capacity is exhausted
  success_criteria:
  - Local placement fails on capacity exhaustion for the submitted order
  - A valid borrow authorization with a bounded quota is present
  - Overflow is routed to an eligible peer within the borrow quota
  - Borrowed usage is attributed back to the requester for chargeback
  - An order exceeding the remaining borrow quota is denied, not silently placed
  - The borrow decision, quota consumption, and attribution are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: cross_domain_constraint
    provider_landscape: peer_dcm_required
    governance_context: standard_governance
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: borrow policy authorizes bounded overflow and denies quota breach
  - domain: provider
    interaction: peer provider realizes the overflow within quota
  - domain: data
    interaction: borrowed usage attributed for chargeback; quota consumption tracked
  - domain: audit
    interaction: borrow decision and attribution recorded
