uuid: uc-hammer-federation-008
handle: federation/federated-contribution-admission
scenario:
  description: 'A peer DCM offers to contribute a provider capability (a specialized GPU pool) into the
    local estate''s catalog so local teams can order against it. This contribution must pass admission
    before it becomes orderable: the local DCM evaluates the peer''s offered capability against admission
    policy (attestation valid, capability schema conformant, category permitted, default-deny otherwise).
    Only on admission does the contributed capability appear as an eligible provider. This tests federated
    contribution admission — a peer adding to, not just consuming from, the local estate.

    '
  actor:
    persona: tenant-admin
    profile: prod
  intent: Admit a peer-contributed provider capability into the local catalog under policy
  success_criteria:
  - Peer submits a capability contribution with attestation and a conformant schema
  - Admission policy evaluates attestation, schema conformance, and category permission
  - A non-conformant or unattested contribution is denied by default-deny
  - Only an admitted contribution becomes an eligible provider for local orders
  - Provenance (which peer contributed the capability) is retained on the catalog entry
  - The admission decision and rationale are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: peer_dcm_required
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
  - domain: policy
    interaction: admission policy evaluates attestation, schema, and category; default-deny
  - domain: provider
    interaction: admitted capability registered as an eligible provider with peer provenance
  - domain: audit
    interaction: contribution admission decision and rationale recorded
