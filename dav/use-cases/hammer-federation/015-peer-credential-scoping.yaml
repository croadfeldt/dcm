uuid: uc-hammer-federation-015
handle: federation/peer-credential-scoping
scenario:
  description: 'When the local DCM dispatches to a peer, it must present a credential scoped strictly
    to the federation interaction — authorized for the specific capability being ordered and nothing more,
    with a short validity. A security officer verifies that the peer accepts a correctly-scoped credential,
    rejects one whose scope exceeds the ordered capability, and rejects an expired one, so a federation
    credential cannot be replayed to reach unrelated peer resources. This tests least-privilege credential
    scoping at the federation boundary.

    '
  actor:
    persona: security-officer
    profile: fsi
  intent: Enforce least-privilege, correctly-scoped credentials on federation dispatch
  success_criteria:
  - Local DCM presents a credential scoped to exactly the ordered capability
  - Peer accepts a correctly-scoped, unexpired credential
  - A credential scoped beyond the ordered capability is rejected
  - An expired credential is rejected
  - The credential cannot be replayed to reach unrelated peer resources
  - Credential issuance, scope, and acceptance/rejection are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: peer_dcm_required
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: fsi
  expected_domain_interactions:
  - domain: policy
    interaction: scoping policy issues a least-privilege, short-lived federation credential
  - domain: provider
    interaction: peer validates scope and expiry; rejects over-scoped or expired credentials
  - domain: audit
    interaction: credential scope and acceptance/rejection recorded
