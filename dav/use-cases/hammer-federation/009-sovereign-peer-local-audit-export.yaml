handle: federation/sovereign-peer-local-audit-manual-export
scenario:
  description: 'A sovereign peer DCM, operating under a mandate that no audit record may leave its jurisdiction
    automatically, participates in a federation interaction. When the local DCM requests a cross-signed
    checkpoint, the sovereign peer must keep its audit trail local-only and provide no automatic export;
    instead it produces a manually-releasable export package that a human authority reviews and releases
    out-of-band. The local DCM must complete the interaction knowing the peer''s audit is authoritative-but-local,
    accepting a deferred/manual proof rather than a live one. This tests sovereign local-only audit with
    manual export inside a federation.

    '
  actor:
    persona: compliance-auditor
    profile: sovereign
  intent: Interact with a sovereign peer whose audit is local-only with manual export
  success_criteria:
  - Sovereign peer participates without auto-exporting any audit record
  - Live cross-signed checkpoint export is refused per sovereignty mandate
  - The peer produces a manually-releasable export package instead
  - Release requires human authority review out-of-band; no automatic transfer occurs
  - Local DCM completes the interaction accepting a deferred/manual audit proof
  - The sovereignty constraint and the deferred-proof arrangement are recorded locally
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: hard_dependencies
    policy_complexity: human_escalation_required
    provider_landscape: peer_dcm_required
    governance_context: sovereignty_enforced
    failure_mode: happy_path
  profile: sovereign
  expected_domain_interactions:
  - domain: policy
    interaction: sovereignty mandate forbids auto-export; requires human-released package
  - domain: audit
    interaction: peer audit retained local-only; manual export package produced on human release
  - domain: provider
    interaction: interaction completes on a deferred/manual proof rather than a live checkpoint
