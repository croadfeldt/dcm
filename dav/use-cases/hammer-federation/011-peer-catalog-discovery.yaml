uuid: uc-hammer-federation-011
handle: federation/peer-catalog-discovery
scenario:
  description: 'A platform engineer wants to see what a trusted peer DCM can provide before authoring
    any order. The local DCM queries the peer''s published catalog and lists the offered resource types
    and capabilities, read-only, with no resource created and no commitment made. This is the simple happy-path
    baseline for federation: a peer exposes an orderable catalog and the local DCM can enumerate it.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Discover a trusted peer DCM's published catalog of orderable capabilities
  success_criteria:
  - Local DCM issues a read-only catalog query to the peer
  - Peer returns its published, orderable resource types and capabilities
  - No resource is created and no commitment is made by the query
  - Offerings are attributed to the peer as their source
  - The peer's published model version is visible alongside the catalog
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: peer_dcm_required
    governance_context: no_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: peer returns its published catalog to a read-only query
  - domain: data
    interaction: offerings enumerated locally with peer attribution; nothing persisted as owned
