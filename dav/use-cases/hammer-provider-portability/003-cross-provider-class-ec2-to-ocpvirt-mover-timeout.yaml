handle: provider-portability/cross-provider-class-ec2-to-ocpvirt-mover-timeout
scenario:
  description: An AWS EC2 instance is re-ported to OCPVirt. Compute re-realizes from intent quickly, but the third-party
    data-migration provider moving the disk exceeds its operation deadline. DCM records the timeout on the data
    step, holds the target in a non-operational state, and does not mark the re-port complete — the compute is realized
    but the workload cannot be brought up until the data lands.
  actor:
    persona: platform-engineer
    profile: standard
  intent: Cross-cloud re-port stalls when the data-migration provider times out
  success_criteria:
  - Compute re-realizes on OCPVirt from the stored intent
  - The data-migration provider is invoked as a tracked Process
  - The mover exceeds its deadline and DCM records a timeout on the data step
  - The target is held non-operational pending the data
  - The incomplete re-port is not marked successful
  dimensions:
    lifecycle_phase: rehydration_provider_portable
    resource_complexity: hard_dependencies
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: timeout
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: data-migration provider exceeds its operation deadline
  - domain: policy
    interaction: recovery policy holds the target non-operational on the timed-out data step
  - domain: audit
    interaction: the timeout and hold are recorded
