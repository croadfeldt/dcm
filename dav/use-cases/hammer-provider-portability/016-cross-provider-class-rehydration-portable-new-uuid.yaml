scenario:
  description: The provider that held a workload is offline, so it cannot be restored in place. The workload is
    rebuilt from its stored intent on a currently-available Provider Class — a Provider-Portable rehydration. The
    replacement is a new realized entity with a new UUID; lineage links it to the source record, and dependents
    re-point to the replacement.
