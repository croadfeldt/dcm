    failure_mode: peer_dcm_disconnect
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: the peer DCM's provider becomes unreachable
  - domain: policy
    interaction: recovery policy holds the port pending the peer
  - domain: audit
    interaction: the disconnect and hold are recorded
