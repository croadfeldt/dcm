scenario:
  description: A workload is re-ported across a federation boundary to a provider in a peer DCM's estate. Mid-port
    the peer DCM becomes unreachable. The local DCM records the disconnect, does not mark the port complete, and
    preserves the source; the port can be retried when the peer returns.
  actor:
    persona: platform-engineer
    profile: standard
  intent: A federated re-port to a peer DCM's provider fails when the peer disconnects
  success_criteria:
  - The re-port dispatches across the federation boundary to the peer
  - The peer DCM becomes unreachable mid-port
  - The local DCM records the peer disconnect
  - The port is not marked complete and the source is preserved
  - The port is retryable when the peer returns
  dimensions:
    lifecycle_phase: rehydration_provider_portable
