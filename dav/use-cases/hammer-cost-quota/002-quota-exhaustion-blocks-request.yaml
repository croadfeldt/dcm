scenario:
  description: 'An application-team-member requests a GPU-backed workload whose footprint exceeds the
    tenant''s remaining quota. The admission pipeline must reject the request before any provider dispatch,
    returning a deterministic quota-exceeded verdict that names the exhausted dimension (e.g. GPU count)
    and the amount over budget. No partial provisioning may occur. The mechanism under test is a hard
    quota ceiling enforced as a blocking validation policy — a denial, not a queue.

    '
  actor:
