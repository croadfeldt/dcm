  - The exhausted quota dimension (GPU count) is identified
  - Request is denied at admission before any provider dispatch
  - No resource is realized and no partial provisioning occurs
  - Denial verdict names the exceeded dimension and the over-budget amount
  - Committed consumption is left unchanged
  - The denial and its rationale are recorded in the audit trail
  dimensions:
