handle: cost-quota/usage-drift-exceeds-quota
scenario:
  description: 'An sre runs drift detection and finds a workload whose realized consumption has grown
    past the quota its intent declared — a provider-side autoscale expanded it beyond the committed ceiling.
    The system must detect the divergence between declared-quota intent and realized consumption, flag
    the over-quota drift, and surface the unbudgeted overage rather than silently absorbing it. The mechanism
    under test is quota drift detection: does the model reconcile realized usage against the quota intent,
    or does quota only gate admission and never re-check?

    '
  actor:
    persona: sre
    profile: prod
  intent: Detect realized consumption that has drifted past declared quota
  success_criteria:
  - Realized consumption is compared against the declared-quota intent
  - The over-quota drift is detected and the exceeded dimension identified
  - The unbudgeted overage amount is quantified
  - The drift is flagged for remediation rather than silently absorbed
  - Remediation options (reclaim, raise quota, charge overage) are surfaced
  - The detected drift and its overage are recorded in audit
  dimensions:
    lifecycle_phase: drift_detection
    resource_complexity: composite_service
    policy_complexity: recovery_policy
    provider_landscape: single_eligible
    governance_context: audit_heavy
    failure_mode: data_inconsistency
  profile: prod
  expected_domain_interactions:
  - domain: data
    interaction: realized consumption reconciled against declared-quota intent
  - domain: policy
    interaction: recovery policy flags over-quota drift and proposes remediation
  - domain: audit
    interaction: drift detection and unbudgeted overage recorded
