scenario:
  description: 'A single physical GPU is time-sliced across three application teams via fractional allocations
    recorded as stakes on the allocatable. A finance-analyst needs the GPU''s amortized cost split across
    the three stakes exactly in proportion to their fractional allocation. The system must read the allocatable,
    enumerate its fractional stakes, and divide cost by stake weight. The mechanism under test is stake-weighted
    cost division over one allocatable resource — does the model carry fractional stake weights, or only
    whole-resource ownership?

    '
