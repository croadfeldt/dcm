  - Each stake carries a resolvable fractional weight
  - Cost is divided across stakes strictly by weight
  - The split sums to the allocatable's total cost within rounding tolerance
  - Rounding residue is assigned deterministically, not dropped
  - Stakes lacking a weight are surfaced as an attribution gap
