handle: cost-quota/cost-based-provider-selection
scenario:
  description: 'A request is eligible for three providers with different price points. The platform-engineer
    expects the placement engine to select the cheapest eligible provider that still satisfies all policy
    constraints (residency, capability). The system must rank eligible providers by cost and choose the
    lowest that passes every non-cost gate. The mechanism under test is whether cost is a first-class
    input to placement — UDLM placement is capability- and policy- driven, so a cost-ranked tiebreak may
    be partial or absent.

    '
  actor:
    persona: platform-engineer
    profile: standard
  intent: Place a workload on the cheapest policy-compliant eligible provider
  success_criteria:
  - The set of eligible providers is resolved for the request
  - Non-cost policy gates (residency, capability) filter the eligible set
  - Surviving providers are ranked by cost
  - The cheapest compliant provider is selected and dispatched
  - If no provider carries cost data, selection falls back and reports the missing signal
  - The ranking basis and the selection rationale are recorded in audit
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: eligible providers and any per-provider cost signal read
  - domain: policy
    interaction: policy gates filter, then cost ranks the surviving providers
  - domain: provider
    interaction: cheapest compliant provider is dispatched
  - domain: audit
    interaction: ranking basis and selection rationale recorded
