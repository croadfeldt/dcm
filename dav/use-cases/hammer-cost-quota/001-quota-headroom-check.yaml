handle: cost-quota/quota-headroom-check
scenario:
  description: 'A tenant-admin submits a new_request for a small VM whose declared resource footprint
    fits comfortably inside the tenant''s remaining quota. The admission pipeline must read the tenant''s
    quota allocation, compute current committed consumption from the intent store, and confirm sufficient
    headroom before the request is accepted. This is the simple, happy-path baseline for quota enforcement:
    the mechanism under test is quota headroom evaluation as a validation policy at admission time.

    '
  actor:
    persona: tenant-admin
    profile: standard
  intent: Provision a small VM that fits within remaining tenant quota
  success_criteria:
  - Request declared footprint (vCPU, memory, storage) is parsed at admission
  - Tenant quota allocation is read from the data model
  - Committed consumption is summed across the tenant's existing intents
  - Headroom is computed and the request is confirmed to fit
  - Request is admitted and dispatched to a single eligible provider
  - The quota check and its computed headroom are recorded in the audit trail
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_validation
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: tenant quota allocation and committed consumption read from intent store
  - domain: policy
    interaction: quota headroom validation evaluates the request footprint against remaining quota
  - domain: audit
    interaction: quota check result and computed headroom recorded
