uuid: uc-hammer-cost-quota-003
handle: cost-quota/quota-increase-request-budget-gated
scenario:
  description: 'A tenant-admin submits a modification that raises the tenant''s quota allocation to accommodate
    a growing service. Because a quota increase commits future spend, the pipeline must treat the change
    as budget-affecting: it must recompute the projected cost of the new ceiling, compare it against the
    tenant''s approved budget envelope, and only then admit the change. The mechanism under test is whether
    the architecture models a quota allocation as first-class, mutable, budget-bound intent rather than
    a static provider limit.

    '
  actor:
    persona: tenant-admin
    profile: standard
  intent: Raise the tenant quota ceiling within the approved budget envelope
  success_criteria:
  - Quota-increase modification is accepted into the pipeline as intent
  - Projected cost of the new ceiling is computed from the requested footprint
  - Projected cost is compared against the tenant's budget envelope
  - Increase within budget is admitted; the raised ceiling is persisted
  - Committed consumption headroom reflects the new ceiling
  - The recompute, the budget comparison, and the decision are recorded in audit
  dimensions:
    lifecycle_phase: modification
    resource_complexity: single_no_deps
    policy_complexity: multi_policy_chain
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
  - domain: data
    interaction: current quota ceiling and budget envelope read; new ceiling persisted
  - domain: policy
    interaction: budget validation compares projected cost of the new ceiling to the envelope
  - domain: audit
    interaction: quota-increase decision and budget comparison recorded
